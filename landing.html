<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GrowFood Control Tower</title>
<style>
  :root {
    --navy: #1E3A24;
    --deep: #3F7D33;
    --teal: #6AA84F;
    --warn: #C9762A;
    --good: #3F7D33;
    --mint: #C5E1A5;
    --bg: #F5F7F8;
    --border: #DDE3E8;
    --border2: #E4E9ED;
    --muted: #5B6470;
    --text: #1B1F26;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: #fff; color: var(--text);
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
  }
  #app {
    display: flex; min-height: 100vh; max-width: 1200px; margin: 0 auto;
    border-left: 0.5px solid var(--border); border-right: 0.5px solid var(--border);
  }
  #sidebar {
    width: 220px; flex-shrink: 0; background: var(--navy); padding: 1rem 0.75rem;
    display: flex; flex-direction: column; gap: 2px;
  }
  .brand { display: flex; align-items: center; gap: 8px; padding: 0 8px 18px; color: #fff; font-size: 14px; font-weight: 600; }
  .brand .logo { width: 26px; height: 26px; border-radius: 7px; background: var(--deep); display: flex; align-items: center; justify-content: center; color: var(--mint); font-size: 13px; }
  .brand .accent { color: var(--mint); }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; cursor: pointer;
    color: #A8C79A; font-size: 13px;
  }
  .nav-item.active { background: var(--deep); color: #fff; font-weight: 600; }
  .nav-item:hover:not(.active) { background: rgba(255,255,255,0.06); }
  #content { flex: 1; min-width: 0; background: var(--bg); padding: 1.25rem 1.5rem; overflow-y: auto; }
  .row-between { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  h2.title { font-size: 17px; font-weight: 600; color: var(--navy); margin: 0; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px; border-radius: 8px; font-size: 12.5px; cursor: pointer;
    padding: 8px 14px; border: none; font-family: inherit;
  }
  .btn-primary { background: var(--deep); color: #fff; font-weight: 600; }
  .btn-secondary { background: #fff; color: var(--navy); border: 0.5px solid var(--border); padding: 6px 12px; font-size: 12px; }
  .btn:disabled { opacity: 0.6; cursor: default; }
  .kpi-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; margin-bottom: 18px; }
  .kpi-grid.narrow { grid-template-columns: repeat(3, minmax(0,1fr)); }
  .kpi { background: #fff; border: 0.5px solid var(--border); border-radius: 10px; padding: 0.8rem 1rem; }
  .kpi.warn { background: #F5E3D0; border: none; }
  .kpi .label { font-size: 11px; color: var(--muted); margin: 0 0 4px; }
  .kpi.warn .label { color: var(--warn); }
  .kpi .value { font-size: 19px; font-weight: 600; margin: 0; color: var(--navy); }
  .kpi.warn .value { color: var(--warn); }
  .card { background: #fff; border: 0.5px solid var(--border); border-radius: 10px; overflow: hidden; }
  .list-header, .list-row {
    display: grid; grid-template-columns: 1.3fr 1.2fr 0.9fr 0.7fr 0.9fr 0.4fr; padding: 12px 14px; align-items: center; font-size: 13px;
  }
  .list-header { padding: 8px 14px; background: var(--bg); font-size: 11px; color: var(--muted); }
  .list-row { border-top: 0.5px solid var(--border2); cursor: pointer; }
  .list-row:hover { background: #FAFBFB; }
  .list-row .sub { color: var(--muted); font-size: 11px; display: block; }
  .muted { color: var(--muted); }
  .pill { font-size: 11px; padding: 3px 10px; border-radius: 6px; width: fit-content; display: inline-block; }
  .chip { background: #EAF3E6; color: var(--deep); font-size: 11.5px; padding: 2px 9px; border-radius: 12px; display: inline-block; margin: 0 6px 6px 0; }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); }
  .back-link { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; cursor: pointer; margin-bottom: 14px; }
  .trip-card { background: #fff; border: 0.5px solid var(--border); border-radius: 12px; padding: 1.25rem; }
  .cargo-header, .cargo-row {
    display: grid; grid-template-columns: 1.4fr 1.1fr 0.8fr 1fr; padding: 10px 12px; align-items: center; font-size: 13px;
  }
  .cargo-header { padding: 8px 12px; background: var(--bg); font-size: 11px; color: var(--muted); }
  .cargo-row { border-top: 0.5px solid var(--border2); }
  select, input, textarea {
    font-family: inherit; font-size: 13px; padding: 8px 10px; border-radius: 8px; border: 0.5px solid var(--border);
    width: 100%; box-sizing: border-box;
  }
  label.field-label { font-size: 11.5px; color: var(--muted); display: block; margin-bottom: 4px; }
  .field { margin-bottom: 10px; }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: none; align-items: center; justify-content: center; z-index: 50; padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 12px; padding: 1.25rem; width: 380px; max-width: 95%; max-height: 85vh; overflow-y: auto;
  }
  .modal.wide { width: 640px; }
  .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .modal-head .x { cursor: pointer; color: var(--muted); font-size: 18px; line-height: 1; }
  .filter-chip {
    padding: 6px 14px; border-radius: 20px; font-size: 12.5px; cursor: pointer; background: #fff; color: var(--muted);
    border: 0.5px solid var(--border); display: inline-block; margin: 0 8px 8px 0;
  }
  .filter-chip.active { background: var(--navy); color: #fff; }
  .partner-block { margin-bottom: 16px; background: #fff; border: 0.5px solid var(--border); border-radius: 10px; padding: 1rem; }
  .partner-block .name { font-size: 14px; font-weight: 600; color: var(--teal); margin: 0 0 10px; }
  .partner-row { display: flex; justify-content: space-between; padding: 8px 0; border-top: 0.5px solid var(--border2); font-size: 13px; gap: 10px; }
  .import-trip { border: 0.5px solid var(--border); border-radius: 10px; padding: 0.9rem; margin-bottom: 12px; }
  .import-trip .head { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .import-trip .head .r { font-weight: 600; color: var(--navy); font-size: 14px; }
  .import-trip .head .d { font-size: 12px; color: var(--muted); }
  .import-line { display: flex; justify-content: space-between; padding: 4px 0; border-top: 0.5px solid var(--border2); font-size: 12.5px; }
  .import-total { margin-top: 8px; font-size: 12.5px; color: var(--muted); }
  .import-total.mismatch { color: var(--warn); }
  .chat-box { flex: 1; min-height: 260px; background: #fff; border: 0.5px solid var(--border); border-radius: 10px; padding: 1rem; margin-bottom: 12px; overflow-y: auto; }
  .chat-msg { display: flex; margin-bottom: 8px; }
  .chat-msg.user { justify-content: flex-end; }
  .chat-bubble { max-width: 80%; font-size: 13px; padding: 8px 12px; border-radius: 10px; white-space: pre-wrap; }
  .chat-bubble.user { background: var(--navy); color: #fff; }
  .chat-bubble.assistant { background: #EAF3E6; color: var(--text); }
  .suggestion { font-size: 12.5px; color: var(--deep); background: #EAF3E6; padding: 8px 12px; border-radius: 8px; cursor: pointer; width: fit-content; margin-bottom: 6px; }
  .ai-note { font-size: 11.5px; color: var(--warn); background: #F5E3D0; padding: 8px 10px; border-radius: 8px; margin-bottom: 10px; }
  .error-banner { background: #F5E3D0; color: var(--warn); padding: 6px 12px; border-radius: 8px; font-size: 12px; margin-bottom: 10px; }
  ::placeholder { color: #9aa1a8; }
</style>
</head>
<body>
<div id="app"></div>

<script>
const STORAGE_KEY = "control-tower-trips-html-v1";

const STATUS_LABEL = {
  ok: { label: "в пути", bg: "#E4F0DC", fg: "#3F7D33" },
  delayed: { label: "задержка", bg: "#F5E3D0", fg: "#C9762A" },
  risk: { label: "риск ETA", bg: "#F5E3D0", fg: "#C9762A" },
  no_ttn: { label: "нет ТТН", bg: "#F5E3D0", fg: "#C9762A" },
  delivered: { label: "выгружен", bg: "#EAF3E6", fg: "#3F7D33" },
};

function uid() { return Math.random().toString(36).slice(2, 9); }
function round(n) { return Math.round(n * 10) / 10; }
function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function seedTrips() {
  return [
    {
      id: uid(), route: "Москва — Казань", driver: "Игорь Мастиенко", vehicle: "А420ВС77", eta: "14:20",
      dateFrom: "", dateTo: "", unloadPoints: [],
      cargos: [
        { id: uid(), client: "Яндекс", order: "", quantity: 6.5, unit: "м³", status: "ok" },
        { id: uid(), client: "Самокат", order: "", quantity: 4.1, unit: "м³", status: "ok" },
        { id: uid(), client: "GrowFood (свой склад)", order: "", quantity: 3.6, unit: "м³", status: "delayed" },
      ],
    },
    {
      id: uid(), route: "Москва — Воронеж", driver: "Сергей Поляков", vehicle: "В215ХМ77", eta: "17:45",
      dateFrom: "", dateTo: "", unloadPoints: [],
      cargos: [
        { id: uid(), client: "GrowFood (свой склад)", order: "", quantity: 8.0, unit: "м³", status: "delayed" },
        { id: uid(), client: "Яндекс", order: "", quantity: 2.2, unit: "м³", status: "ok" },
      ],
    },
  ];
}

function tripStatus(trip) {
  if (trip.cargos.some((c) => c.status === "delayed")) return "delayed";
  if (trip.cargos.some((c) => c.status === "no_ttn")) return "no_ttn";
  if (trip.cargos.some((c) => c.status === "risk")) return "risk";
  return "ok";
}

function sumByUnit(cargos) {
  const map = {};
  cargos.forEach((c) => { const u = c.unit || "ед."; map[u] = (map[u] || 0) + (parseFloat(c.quantity) || 0); });
  const entries = Object.entries(map);
  if (entries.length === 0) return "—";
  return entries.map(([u, v]) => `${round(v)} ${u}`).join(" + ");
}

function parseDispatchText(text) {
  const lines = text.split("\n").map((l) => l.trim()).filter(Boolean);
  const headerRegex = /^С\s*(\d{1,2}\.\d{1,2})\s*на\s*(\d{1,2}\.\d{1,2})\s*в\s*(\S+)\s*едет:?/i;
  const totalRegex = /^итого[:\s]+(\d+)\s*палл/i;
  const unloadRegex = /^выгрузк[иа][:\s]+(.+)/i;

  const blocks = [];
  let current = null;
  for (const line of lines) {
    const h = line.match(headerRegex);
    if (h) {
      if (current) blocks.push(current);
      current = { dateFrom: h[1], dateTo: h[2], destination: h[3], cargoLines: [], statedTotal: null, unloadPoints: [] };
      continue;
    }
    if (!current) continue;
    const t = line.match(totalRegex);
    if (t) { current.statedTotal = parseInt(t[1], 10); continue; }
    const u = line.match(unloadRegex);
    if (u) { current.unloadPoints = u[1].split(",").map((s) => s.trim()).filter(Boolean); continue; }
    current.cargoLines.push(line);
  }
  if (current) blocks.push(current);

  return blocks.map((b) => {
    const cargos = b.cargoLines.map((line) => {
      const m = line.match(/^(.*)-\s*(\d+(?:[.,]\d+)?)\s*$/);
      let client = line, order = "", qty = 0;
      if (m) {
        const namePart = m[1].trim();
        qty = parseFloat(m[2].replace(",", "."));
        const nameParts = namePart.split(/\s+-\s+/).map((s) => s.trim()).filter(Boolean);
        client = nameParts[0] || namePart;
        order = nameParts.length > 1 ? nameParts.slice(1).join(" - ") : "";
      }
      return { id: uid(), client, order, quantity: isNaN(qty) ? 0 : qty, unit: "паллет", status: "ok" };
    });
    const computedTotal = cargos.reduce((s, c) => s + (c.quantity || 0), 0);
    return {
      id: uid(), route: `→ ${b.destination}`, driver: "", vehicle: "", eta: "",
      dateFrom: b.dateFrom, dateTo: b.dateTo, unloadPoints: b.unloadPoints, cargos,
      statedTotal: b.statedTotal, computedTotal,
    };
  });
}

// ---------------- App state ----------------
const state = {
  trips: [],
  loaded: false,
  view: "all", // all | exceptions | partners | assistant
  selectedTripId: null,
  partnerFilter: null,
  error: "",
  aiMessages: [],
  aiLoading: false,
  aiError: "",
  importParsed: null,
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    state.trips = raw ? JSON.parse(raw) : seedTrips();
    if (!raw) saveState();
  } catch (e) {
    state.trips = seedTrips();
  }
  state.loaded = true;
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.trips));
  } catch (e) {
    state.error = "Не удалось сохранить изменения";
    render();
    setTimeout(() => { state.error = ""; render(); }, 2500);
  }
}

function enrichedTrips() {
  return state.trips.map((t) => ({ ...t, computedStatus: tripStatus(t) }));
}

// ---------------- Actions ----------------
function addTrip(data) {
  const trip = { id: uid(), unloadPoints: [], dateFrom: "", dateTo: "", cargos: [], ...data };
  state.trips = [trip, ...state.trips];
  saveState();
  closeModal("modal-new-trip");
  state.selectedTripId = trip.id;
  render();
}

function addParsedTrips(parsedTrips) {
  const cleaned = parsedTrips.map(({ statedTotal, computedTotal, ...t }) => t);
  state.trips = [...cleaned, ...state.trips];
  saveState();
  closeModal("modal-import");
  state.importParsed = null;
  render();
}

function addCargo(tripId, data) {
  state.trips = state.trips.map((t) => t.id === tripId ? { ...t, cargos: [...t.cargos, { id: uid(), ...data }] } : t);
  saveState();
  closeModal("modal-new-cargo");
  render();
}

function updateCargoStatus(tripId, cargoId, status) {
  state.trips = state.trips.map((t) => t.id !== tripId ? t : { ...t, cargos: t.cargos.map((c) => c.id === cargoId ? { ...c, status } : c) });
  saveState();
  render();
}

function deleteTrip(tripId) {
  state.trips = state.trips.filter((t) => t.id !== tripId);
  saveState();
  if (state.selectedTripId === tripId) state.selectedTripId = null;
  render();
}

async function askAssistant(question) {
  if (!question.trim() || state.aiLoading) return;
  const context = JSON.stringify(state.trips.map((t) => ({
    route: t.route, dateFrom: t.dateFrom, dateTo: t.dateTo, driver: t.driver, vehicle: t.vehicle, eta: t.eta,
    unloadPoints: t.unloadPoints, status: tripStatus(t),
    cargos: t.cargos.map((c) => ({ client: c.client, order: c.order, quantity: c.quantity, unit: c.unit, status: c.status })),
  })));
  state.aiMessages = [...state.aiMessages, { role: "user", content: question }];
  state.aiLoading = true;
  state.aiError = "";
  render();
  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: `Ты — AI-ассистент диспетчера в панели GrowFood Control Tower. Отвечай кратко (2-5 предложений), по-русски, только на основе данных о рейсах ниже. Если ответа в данных нет — так и скажи.\n\nДанные о текущих рейсах (JSON):\n${context}`,
        messages: state.aiMessages,
      }),
    });
    const data = await response.json();
    const text = (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n").trim();
    state.aiMessages = [...state.aiMessages, { role: "assistant", content: text || "Не удалось получить ответ от ассистента." }];
  } catch (e) {
    state.aiError = "Не удалось связаться с ассистентом. Это HTML-версия без сервера — прямой вызов Anthropic API из браузера обычно блокируется CORS. Нужен свой бэкенд-прокси с API-ключом.";
  } finally {
    state.aiLoading = false;
    render();
  }
}

// ---------------- Modal helpers ----------------
function openModal(id) { document.getElementById(id).classList.add("open"); }
function closeModal(id) { document.getElementById(id).classList.remove("open"); }

// ---------------- Render ----------------
function pillHtml(status) {
  const s = STATUS_LABEL[status] || STATUS_LABEL.ok;
  return `<span class="pill" style="background:${s.bg};color:${s.fg}">${s.label}</span>`;
}

function kpiHtml(label, value, warn) {
  return `<div class="kpi ${warn ? "warn" : ""}"><p class="label">${escapeHtml(label)}</p><p class="value">${escapeHtml(value)}</p></div>`;
}

function navItemHtml(view, icon, label, badge) {
  const active = state.view === view;
  return `<div class="nav-item ${active ? "active" : ""}" data-nav="${view}">
    <span>${icon}</span><span>${escapeHtml(label)}${badge ? ` · ${badge}` : ""}</span>
  </div>`;
}

function renderSidebar(exceptionsCount) {
  return `
    <div class="brand"><div class="logo">🚚</div>GrowFood <span class="accent">Control Tower</span></div>
    ${navItemHtml("all", "📋", "Все рейсы")}
    ${navItemHtml("exceptions", "⚠️", "Исключения", exceptionsCount || null)}
    ${navItemHtml("partners", "👥", "Партнёры")}
    ${navItemHtml("assistant", "💬", "AI-ассистент")}
  `;
}

function renderDashboard(list, allCargos, allClients, exceptionsCount) {
  const rows = list.map((t) => `
    <div class="list-row" data-open-trip="${t.id}">
      <span>${escapeHtml(t.route)}${(t.dateFrom || t.dateTo) ? `<span class="sub">${escapeHtml(t.dateFrom)}${t.dateTo ? " — " + escapeHtml(t.dateTo) : ""}</span>` : ""}</span>
      <span class="muted" style="font-size:12px">${escapeHtml(Array.from(new Set(t.cargos.map(c => c.client))).join(", ") || "—")}</span>
      <span class="muted" style="font-size:12px">${escapeHtml(sumByUnit(t.cargos))}</span>
      <span class="muted">${escapeHtml(t.eta || "")}</span>
      ${pillHtml(t.computedStatus)}
      <span class="muted">›</span>
    </div>
  `).join("");

  return `
    <div class="row-between">
      <h2 class="title">${state.view === "exceptions" ? "Рейсы, требующие внимания" : "Активные рейсы"}</h2>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-secondary" id="btn-import">📋 Вставить из чата</button>
        <button class="btn btn-primary" id="btn-new-trip">+ Новый рейс</button>
      </div>
    </div>
    <div class="kpi-grid">
      ${kpiHtml("Рейсов", state.trips.length)}
      ${kpiHtml("Исключения", exceptionsCount, exceptionsCount > 0)}
      ${kpiHtml("Общий объём", sumByUnit(allCargos))}
      ${kpiHtml("Клиентов", allClients.length)}
    </div>
    ${list.length === 0 ? `
      <div class="empty">
        <p>${state.view === "exceptions" ? "Нет рейсов, требующих внимания" : "Рейсов пока нет"}</p>
        ${state.view !== "exceptions" ? `<button class="btn btn-primary" id="btn-new-trip-empty">+ Создать рейс</button>` : ""}
      </div>
    ` : `
      <div class="card">
        <div class="list-header"><span>Маршрут</span><span>Клиенты</span><span>Объём</span><span>ETA</span><span>Статус</span><span></span></div>
        ${rows}
      </div>
    `}
  `;
}

function renderTripDetail(trip) {
  const cargoRows = trip.cargos.map((c) => `
    <div class="cargo-row">
      <span>${escapeHtml(c.client)}</span>
      <span class="muted">${escapeHtml(c.order || "—")}</span>
      <span class="muted">${escapeHtml(c.quantity)} ${escapeHtml(c.unit)}</span>
      <select data-cargo-status="${c.id}" data-trip-id="${trip.id}">
        ${Object.entries(STATUS_LABEL).map(([k, v]) => `<option value="${k}" ${c.status === k ? "selected" : ""}>${v.label}</option>`).join("")}
      </select>
    </div>
  `).join("");

  const unloadHtml = (trip.unloadPoints && trip.unloadPoints.length) ? `
    <div style="margin-bottom:16px;">
      <span class="muted" style="font-size:11.5px; margin-right:4px;">Выгрузки:</span>
      ${trip.unloadPoints.map(p => `<span class="chip">${escapeHtml(p)}</span>`).join("")}
    </div>` : "";

  return `
    <div class="back-link" id="btn-back">‹ Назад к рейсам</div>
    <div class="trip-card">
      <div class="row-between" style="margin-bottom:4px;">
        <span style="font-size:18px; font-weight:600; color:var(--navy)">${escapeHtml(trip.route)}</span>
        ${pillHtml(trip.computedStatus)}
      </div>
      <p class="muted" style="font-size:12.5px; margin:0 0 10px;">
        ${trip.driver ? `Водитель ${escapeHtml(trip.driver)} · ` : ""}${trip.vehicle ? `машина ${escapeHtml(trip.vehicle)} · ` : ""}${trip.eta ? `ETA ${escapeHtml(trip.eta)}` : ""}
        ${(trip.dateFrom || trip.dateTo) ? ` · ${escapeHtml(trip.dateFrom)}${trip.dateTo ? " — " + escapeHtml(trip.dateTo) : ""}` : ""}
      </p>
      ${unloadHtml}
      <div class="kpi-grid narrow">
        ${kpiHtml("Общий объём", sumByUnit(trip.cargos))}
        ${kpiHtml("Грузов в рейсе", trip.cargos.length)}
        ${kpiHtml("Статус", (STATUS_LABEL[trip.computedStatus] || {}).label || "—")}
      </div>
      <div class="row-between">
        <span style="font-size:13.5px; font-weight:600; color:var(--navy)">Грузы внутри рейса</span>
        <button class="btn btn-secondary" id="btn-add-cargo">+ Добавить груз</button>
      </div>
      ${trip.cargos.length === 0 ? `<p class="muted" style="font-size:13px;">Грузы ещё не добавлены.</p>` : `
        <div class="card">
          <div class="cargo-header"><span>Клиент</span><span>Заказ / бренд</span><span>Объём</span><span>Статус</span></div>
          ${cargoRows}
        </div>
      `}
      <button class="btn btn-secondary" id="btn-delete-trip" style="margin-top:16px; color:#A32D2D; border-color:#F09595;">Удалить рейс</button>
    </div>
  `;
}

function renderPartners(allClients, trips) {
  const visible = state.partnerFilter ? allClients.filter((c) => c === state.partnerFilter) : allClients;
  const blocks = visible.map((client) => {
    const cargos = trips.flatMap((t) => t.cargos.filter((c) => c.client === client).map((c) => ({ ...c, route: t.route, eta: t.eta })));
    if (cargos.length === 0) return "";
    return `
      <div class="partner-block">
        <p class="name">${escapeHtml(client)}</p>
        ${cargos.map((c) => `
          <div class="partner-row">
            <span>${c.order ? escapeHtml(c.order) + " · " : ""}${escapeHtml(c.quantity)} ${escapeHtml(c.unit)}</span>
            <span class="muted">${escapeHtml(c.route)}${c.eta ? " · ETA " + escapeHtml(c.eta) : ""}</span>
            ${pillHtml(c.status)}
          </div>
        `).join("")}
      </div>
    `;
  }).join("");

  return `
    <h2 class="title" style="margin-bottom:14px;">Партнёрский доступ (Follow + Share)</h2>
    <p class="muted" style="font-size:12.5px; margin-bottom:16px;">Выберите клиента, чтобы увидеть только его грузы — так будет выглядеть внешняя ссылка для партнёра.</p>
    <div style="margin-bottom:18px;">
      <span class="filter-chip ${!state.partnerFilter ? "active" : ""}" data-partner-filter="">Все клиенты</span>
      ${allClients.map((c) => `<span class="filter-chip ${state.partnerFilter === c ? "active" : ""}" data-partner-filter="${escapeHtml(c)}">${escapeHtml(c)}</span>`).join("")}
    </div>
    ${blocks}
  `;
}

function renderAssistant() {
  const suggestions = ["Где груз Яндекса на рейсе в Казань?", "Какие рейсы сейчас с задержкой?", "Сколько всего паллет едет в Казань?"];
  const messagesHtml = state.aiMessages.length === 0 ? `
    <p class="muted" style="font-size:13px; margin-bottom:10px;">Например, спроси:</p>
    ${suggestions.map((s) => `<div class="suggestion" data-suggestion="${escapeHtml(s)}">${escapeHtml(s)}</div>`).join("")}
  ` : state.aiMessages.map((m) => `
    <div class="chat-msg ${m.role}"><div class="chat-bubble ${m.role}">${escapeHtml(m.content)}</div></div>
  `).join("");

  return `
    <h2 class="title" style="margin-bottom:4px;">AI-ассистент</h2>
    <p class="muted" style="font-size:12.5px; margin-bottom:14px;">Отвечает на вопросы по текущим рейсам и грузам — на основе данных в этой панели.</p>
    <div class="ai-note">Это HTML-версия без сервера: прямой вызов Anthropic API из браузера обычно блокирует CORS. Чтобы ассистент реально отвечал, нужен свой бэкенд-прокси с API-ключом.</div>
    <div class="chat-box" id="chat-box">
      ${messagesHtml}
      ${state.aiLoading ? `<p class="muted" style="font-size:12.5px; font-style:italic;">Ассистент печатает...</p>` : ""}
      ${state.aiError ? `<p style="font-size:12.5px; color:var(--warn);">${escapeHtml(state.aiError)}</p>` : ""}
    </div>
    <div style="display:flex; gap:8px;">
      <input id="ai-input" placeholder="Спросить про рейсы и грузы..." style="border-radius:20px;" />
      <button class="btn btn-primary" id="ai-send" style="border-radius:20px;" ${state.aiLoading ? "disabled" : ""}>➤</button>
    </div>
  `;
}

function render() {
  if (!state.loaded) {
    document.getElementById("app").innerHTML = `<div style="padding:2rem; color:var(--muted);">Загрузка...</div>`;
    return;
  }
  const enriched = enrichedTrips();
  const exceptions = enriched.filter((t) => t.computedStatus !== "ok");
  const allCargos = state.trips.flatMap((t) => t.cargos);
  const allClients = Array.from(new Set(allCargos.map((c) => c.client)));
  const selectedTrip = enriched.find((t) => t.id === state.selectedTripId) || null;
  const listToShow = state.view === "exceptions" ? exceptions : enriched;

  let contentHtml = "";
  if (selectedTrip) contentHtml = renderTripDetail(selectedTrip);
  else if (state.view === "partners") contentHtml = renderPartners(allClients, enriched);
  else if (state.view === "assistant") contentHtml = renderAssistant();
  else contentHtml = renderDashboard(listToShow, allCargos, allClients, exceptions.length);

  document.getElementById("app").innerHTML = `
    <div id="sidebar">${renderSidebar(exceptions.length)}</div>
    <div id="content">
      ${state.error ? `<div class="error-banner">${escapeHtml(state.error)}</div>` : ""}
      ${contentHtml}
    </div>

    <div class="modal-overlay" id="modal-new-trip">
      <div class="modal">
        <div class="modal-head"><span style="font-size:15px; font-weight:600; color:var(--navy);">Новый рейс</span><span class="x" data-close="modal-new-trip">×</span></div>
        <div class="field"><label class="field-label">Маршрут (откуда — куда)</label><input id="nt-route" placeholder="Москва — Казань" /></div>
        <div class="field"><label class="field-label">Водитель</label><input id="nt-driver" placeholder="Имя Фамилия" /></div>
        <div class="field"><label class="field-label">Госномер машины</label><input id="nt-vehicle" placeholder="А420ВС77" /></div>
        <div class="field"><label class="field-label">ETA</label><input id="nt-eta" placeholder="14:20" /></div>
        <button class="btn btn-primary" id="nt-submit" style="width:100%; justify-content:center;">Создать рейс</button>
      </div>
    </div>

    <div class="modal-overlay" id="modal-new-cargo">
      <div class="modal">
        <div class="modal-head"><span style="font-size:15px; font-weight:600; color:var(--navy);">Добавить груз в рейс</span><span class="x" data-close="modal-new-cargo">×</span></div>
        <div class="field"><label class="field-label">Клиент / заказчик</label><input id="nc-client" placeholder="Самокат Казань, Пятёрочка..." /></div>
        <div class="field"><label class="field-label">Заказ / бренд (необязательно)</label><input id="nc-order" placeholder="Королевский вкус КЗН" /></div>
        <div style="display:flex; gap:8px;">
          <div class="field" style="flex:1;"><label class="field-label">Количество</label><input id="nc-qty" placeholder="6" /></div>
          <div class="field" style="width:110px;"><label class="field-label">Ед.</label>
            <select id="nc-unit"><option value="паллет">паллет</option><option value="м³">м³</option><option value="кг">кг</option></select>
          </div>
        </div>
        <button class="btn btn-primary" id="nc-submit" style="width:100%; justify-content:center;">Добавить</button>
      </div>
    </div>

    <div class="modal-overlay" id="modal-import">
      <div class="modal wide">
        <div class="modal-head"><span style="font-size:15px; font-weight:600; color:var(--navy);">Вставить рейс(ы) из чата диспетчера</span><span class="x" data-close="modal-import">×</span></div>
        <p style="font-size:12px; color:var(--muted); margin-bottom:8px;">Вставь текст в том же формате, в котором его обычно печатаешь — с заголовком «С ДД.ММ на ДД.ММ в Город едет:», строками груза «Клиент - Заказ - Количество», итогом и «Выгрузки: ...».</p>
        <textarea id="import-text" rows="8" style="font-family:monospace; font-size:12.5px; margin-bottom:10px;" placeholder="С 22.07 на 23.07 в Казань едет:&#10;Прием Казань - 1&#10;...&#10;итого: 33 паллет&#10;Выгрузки: Васильченко"></textarea>
        <button class="btn btn-secondary" id="import-parse" style="margin-bottom:14px;">Разобрать текст</button>
        <div id="import-preview"></div>
      </div>
    </div>
  `;

  attachHandlers();
}

function attachHandlers() {
  document.querySelectorAll("[data-nav]").forEach((el) => {
    el.addEventListener("click", () => { state.view = el.getAttribute("data-nav"); state.selectedTripId = null; render(); });
  });
  document.querySelectorAll("[data-open-trip]").forEach((el) => {
    el.addEventListener("click", () => { state.selectedTripId = el.getAttribute("data-open-trip"); render(); });
  });
  const backBtn = document.getElementById("btn-back");
  if (backBtn) backBtn.addEventListener("click", () => { state.selectedTripId = null; render(); });

  const btnNewTrip = document.getElementById("btn-new-trip");
  if (btnNewTrip) btnNewTrip.addEventListener("click", () => openModal("modal-new-trip"));
  const btnNewTripEmpty = document.getElementById("btn-new-trip-empty");
  if (btnNewTripEmpty) btnNewTripEmpty.addEventListener("click", () => openModal("modal-new-trip"));
  const btnImport = document.getElementById("btn-import");
  if (btnImport) btnImport.addEventListener("click", () => openModal("modal-import"));
  const btnAddCargo = document.getElementById("btn-add-cargo");
  if (btnAddCargo) btnAddCargo.addEventListener("click", () => openModal("modal-new-cargo"));
  const btnDeleteTrip = document.getElementById("btn-delete-trip");
  if (btnDeleteTrip) btnDeleteTrip.addEventListener("click", () => deleteTrip(state.selectedTripId));

  document.querySelectorAll("[data-close]").forEach((el) => {
    el.addEventListener("click", () => closeModal(el.getAttribute("data-close")));
  });

  document.querySelectorAll("[data-cargo-status]").forEach((el) => {
    el.addEventListener("change", () => {
      updateCargoStatus(el.getAttribute("data-trip-id"), el.getAttribute("data-cargo-status"), el.value);
    });
  });

  document.querySelectorAll("[data-partner-filter]").forEach((el) => {
    el.addEventListener("click", () => { state.partnerFilter = el.getAttribute("data-partner-filter") || null; render(); });
  });

  const ntSubmit = document.getElementById("nt-submit");
  if (ntSubmit) ntSubmit.addEventListener("click", () => {
    const route = document.getElementById("nt-route").value.trim();
    if (!route) return;
    addTrip({
      route,
      driver: document.getElementById("nt-driver").value,
      vehicle: document.getElementById("nt-vehicle").value,
      eta: document.getElementById("nt-eta").value,
    });
  });

  const ncSubmit = document.getElementById("nc-submit");
  if (ncSubmit) ncSubmit.addEventListener("click", () => {
    const client = document.getElementById("nc-client").value.trim();
    if (!client) return;
    addCargo(state.selectedTripId, {
      client,
      order: document.getElementById("nc-order").value,
      quantity: parseFloat(document.getElementById("nc-qty").value) || 0,
      unit: document.getElementById("nc-unit").value,
      status: "ok",
    });
  });

  const importParseBtn = document.getElementById("import-parse");
  if (importParseBtn) importParseBtn.addEventListener("click", () => {
    const text = document.getElementById("import-text").value;
    const parsed = parseDispatchText(text);
    renderImportPreview(parsed);
  });

  const aiSend = document.getElementById("ai-send");
  if (aiSend) aiSend.addEventListener("click", submitAiInput);
  const aiInput = document.getElementById("ai-input");
  if (aiInput) aiInput.addEventListener("keydown", (e) => { if (e.key === "Enter") submitAiInput(); });
  document.querySelectorAll("[data-suggestion]").forEach((el) => {
    el.addEventListener("click", () => askAssistant(el.getAttribute("data-suggestion")));
  });

  const chatBox = document.getElementById("chat-box");
  if (chatBox) chatBox.scrollTop = chatBox.scrollHeight;
}

function submitAiInput() {
  const input = document.getElementById("ai-input");
  const value = input.value;
  if (!value.trim()) return;
  input.value = "";
  askAssistant(value);
}

function renderImportPreview(parsed) {
  const container = document.getElementById("import-preview");
  if (!parsed || parsed.length === 0) {
    container.innerHTML = `<p style="font-size:13px; color:var(--warn);">Не удалось распознать ни одного рейса — проверь формат заголовка «С ДД.ММ на ДД.ММ в Город едет:».</p>`;
    return;
  }
  const tripsHtml = parsed.map((trip, i) => {
    const mismatch = trip.statedTotal !== null && trip.statedTotal !== trip.computedTotal;
    return `
      <div class="import-trip">
        <div class="head"><span class="r">Рейс ${i + 1}: ${escapeHtml(trip.route)}</span><span class="d">${escapeHtml(trip.dateFrom)} — ${escapeHtml(trip.dateTo)}</span></div>
        ${trip.unloadPoints.length ? `<div style="margin-bottom:8px;">${trip.unloadPoints.map(p => `<span class="chip">${escapeHtml(p)}</span>`).join("")}</div>` : ""}
        ${trip.cargos.map((c) => `<div class="import-line"><span>${escapeHtml(c.client)}${c.order ? " — " + escapeHtml(c.order) : ""}</span><span class="muted">${escapeHtml(c.quantity)} ${escapeHtml(c.unit)}</span></div>`).join("")}
        <div class="import-total ${mismatch ? "mismatch" : ""}">
          Посчитано: ${round(trip.computedTotal)} палл${trip.statedTotal !== null ? ` · заявлено: ${trip.statedTotal} палл` : ""}${mismatch ? " — расхождение, проверь строки" : ""}
        </div>
      </div>
    `;
  }).join("");

  container.innerHTML = tripsHtml + `<button class="btn btn-primary" id="import-create" style="width:100%; justify-content:center;">Создать ${parsed.length} ${parsed.length === 1 ? "рейс" : "рейса(ов)"}</button>`;
  document.getElementById("import-create").addEventListener("click", () => addParsedTrips(parsed));
}

loadState();
render();
</script>
</body>
</html>
