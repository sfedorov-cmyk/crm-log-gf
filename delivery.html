.subtitle{font-size:12px;font-weight:400;color:#86868b;margin-left:auto;letter-spacing:-.1px}

const CITIES = Object.keys(RAW_DATA);
const cityState = {};
const cityPrices = {};
let currentCity = CITIES[0];
let activePeriod = 'all';

function initCity(c) {
  if (cityState[c]) return;
  const raw = RAW_DATA[c] || [];
  const zpArr = ZP_DATA[c] || [];
  cityState[c] = {};
  cityPrices[c] = {};
  PERIODS.forEach((_, i) => {
    const w = raw[i] || {mon:0,tue:0,wed:0,thu:0,fri:0,sat:0,sun:0};
    cityPrices[c][i+1] = zpArr[i] || 0;
    cityState[c][i+1] = {};
    DAYS.forEach(d => {
      cityState[c][i+1][d] = {value: w[d] > 0 ? w[d] : '', locked: (i+1) < CURRENT_WEEK};
    });
  });
}

function getTotal(c, n) {
  return DAYS.reduce((s, d) => {
    const v = parseFloat(cityState[c][n][d].value);
    return s + (isNaN(v) ? 0 : v);
  }, 0);
}

function fmt(n) { return Math.round(n).toLocaleString('ru-RU'); }

function getVisibleRange() {
  if (activePeriod === 'all') return [1, 31];
  if (activePeriod === 'q1') return [1, 13];
  if (activePeriod === 'q2') return [14, 26];
  if (activePeriod === 'q3') return [27, 31];
  if (activePeriod === 'month') return getCurrentMonthRange();
  if (activePeriod === 'week') return [CURRENT_WEEK, CURRENT_WEEK];
  return [1, 31];
}

function getCurrentMonthRange() {
  const monthMap = {1:[1,4],2:[5,8],3:[9,13],4:[14,18],5:[19,22],6:[23,26],7:[27,30],8:[31,31]};
  for (const [m, range] of Object.entries(monthMap)) {
    if (CURRENT_WEEK >= range[0] && CURRENT_WEEK <= range[1]) return range;
  }
  return [CURRENT_WEEK, CURRENT_WEEK];
}

function updateInfoBar() {
  document.getElementById('infoName').textContent = PERSONS[currentCity] || '—';
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('infoTime').textContent = 'Обновлено: ' + pad(now.getDate())+'.'+pad(now.getMonth()+1)+'.'+now.getFullYear()+' '+pad(now.getHours())+':'+pad(now.getMinutes());
}

function renderTable() {
  const city = currentCity;
  initCity(city);
  const tbody = document.getElementById('tbody');
  const totals = PERIODS.map((_, i) => getTotal(city, i+1));
  let html = '';

  PERIODS.forEach((period, i) => {
    const n = i+1;
    const isCurrent = n === CURRENT_WEEK;
    const total = totals[i];
    const prev = i > 0 ? totals[i-1] : null;
    const delta = prev !== null && prev > 0 ? total - prev : null;
    const pct = prev !== null && prev > 0 ? (total - prev) / prev * 100 : null;
    const zp = parseFloat(cityPrices[city][n]) || 0;
    const avgP = total > 0 && zp > 0 ? (zp / total) : 0;

    let dHtml = '—'; let dCls = 'delta-neu';
    if (delta !== null) { dCls = delta > 0 ? 'delta-pos' : delta < 0 ? 'delta-neg' : 'delta-neu'; dHtml = (delta >= 0 ? '+' : '') + fmt(delta); }
    let pHtml = '—'; let pCls = 'delta-neu';
    if (pct !== null) { pCls = pct > 0 ? 'delta-pos' : pct < 0 ? 'delta-neg' : 'delta-neu'; pHtml = (pct >= 0 ? '+' : '') + pct.toFixed(1) + '%'; }

    const totalCls = total > 0 ? 'total-cell total-td' : 'total-empty total-td';
    const rowBg = isCurrent ? 'background:#F0FFF4' : '';

    html += `<tr data-row="${n}" style="${rowBg}">`;
    html += `<td class="td-n">${n}</td>`;
    html += `<td class="td-period">${period}${isCurrent ? '<span style="margin-left:4px;font-size:9px;color:#39D353;font-weight:700">▶</span>' : ''}</td>`;

    DAYS.forEach(day => {
      const s = cityState[city][n][day];
      const locked = s.locked;
      const val = s.value;
      const dispVal = val !== '' ? fmt(+val) : '—';
      if (locked) {
        html += `<td class="lk-${day}"><div class="cell-wrap"><span class="cell-val">${dispVal}</span><button class="lock-btn is-locked" data-n="${n}" data-day="${day}">✎</button></div></td>`;
      } else {
        html += `<td class="open-cell"><div class="cell-wrap"><input class="cell-input" type="number" min="0" step="1" value="${val}" placeholder="—" data-n="${n}" data-day="${day}"><button class="lock-btn is-open" data-n="${n}" data-day="${day}">✓</button></div></td>`;
      }
    });

    html += `<td class="${totalCls}">${total > 0 ? fmt(total) : '—'}</td>`;
    html += `<td class="price-cell"><input class="price-input" type="number" min="0" step="1" value="${zp > 0 ? Math.round(zp) : ''}" placeholder="сумма ЗП" data-n="${n}"></td>`;
    html += avgP > 0 ? `<td class="avg-cell">${avgP.toFixed(1)} ₽</td>` : '<td class="avg-cell" style="color:#ccc">—</td>';
    html += `<td class="${dCls} delta-td">${dHtml}</td>`;
    html += `<td class="${pCls} pct-td">${pHtml}</td>`;
    html += '</tr>';
  });

  tbody.innerHTML = html;

  // Bind inputs — НЕ перерисовываем таблицу, только обновляем итоги
  tbody.querySelectorAll('.cell-input').forEach(inp => {
    inp.addEventListener('input', function() {
      cityState[city][+this.dataset.n][this.dataset.day].value = this.value === '' ? '' : +this.value;
      updateRowTotals();
    });
    inp.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); this.blur(); }
    });
  });

  tbody.querySelectorAll('.lock-btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      cityState[city][+this.dataset.n][this.dataset.day].locked = !cityState[city][+this.dataset.n][this.dataset.day].locked;
      renderTable();
    });
  });

  tbody.querySelectorAll('.price-input').forEach(inp => {
    inp.addEventListener('input', function() {
      cityPrices[city][+this.dataset.n] = +this.value;
      updateRowTotals();
      renderSummary();
      updateInfoBar();
    });
  });

  applyPeriodFilter(activePeriod);
  renderSummary();
}

function updateRowTotals() {
  const city = currentCity;
  document.querySelectorAll('#tbody tr').forEach(tr => {
    const n = +tr.dataset.row;
    const total = getTotal(city, n);
    const zp = parseFloat(cityPrices[city][n]) || 0;

    // Update total cell
    const totalTd = tr.querySelector('.total-td');
    if (totalTd) {
      if (total > 0) { totalTd.className = 'total-cell total-td'; totalTd.textContent = fmt(total); }
      else { totalTd.className = 'total-empty total-td'; totalTd.textContent = '—'; }
    }

    // Update avg cell
    const avgTd = tr.querySelector('.avg-cell');
    if (avgTd) {
      const avg = total > 0 && zp > 0 ? (zp / total) : 0;
      avgTd.textContent = avg > 0 ? avg.toFixed(1) + ' ₽' : '—';
      avgTd.style.color = avg > 0 ? '#1a5c28' : '#ccc';
    }

    // Update delta/pct
    const totals = PERIODS.map((_, i) => getTotal(city, i+1));
    const i = n - 1;
    const prev = i > 0 ? totals[i-1] : null;
    const delta = prev !== null && prev > 0 ? total - prev : null;
    const pct = prev !== null && prev > 0 ? (total - prev) / prev * 100 : null;

    const dTd = tr.querySelector('.delta-td');
    if (dTd) {
      if (delta !== null) { dTd.className = (delta > 0 ? 'delta-pos' : delta < 0 ? 'delta-neg' : 'delta-neu') + ' delta-td'; dTd.textContent = (delta >= 0 ? '+' : '') + fmt(delta); }
      else { dTd.className = 'delta-neu delta-td'; dTd.textContent = '—'; }
    }

    const pTd = tr.querySelector('.pct-td');
    if (pTd) {
      if (pct !== null) { pTd.className = (pct > 0 ? 'delta-pos' : pct < 0 ? 'delta-neg' : 'delta-neu') + ' pct-td'; pTd.textContent = (pct >= 0 ? '+' : '') + pct.toFixed(1) + '%'; }
      else { pTd.className = 'delta-neu pct-td'; pTd.textContent = '—'; }
    }
  });
  renderSummary();
}

function renderSummary() {
  const city = currentCity;
  const totals = PERIODS.map((_, i) => getTotal(city, i+1));
  const [r1, r2] = getVisibleRange();
  const visIndices = PERIODS.map((_, i) => i).filter(i => { const n = i+1; return n >= r1 && n <= r2; });
  const visTotals = visIndices.map(i => totals[i]);
  const grandTotal = visTotals.reduce((a, b) => a + b, 0);
  const totalZP = visIndices.reduce((s, i) => s + (parseFloat(cityPrices[city][i+1]) || 0), 0);
  const avgPrice = grandTotal > 0 && totalZP > 0 ? (totalZP / grandTotal) : 0;
  const filled = visTotals.filter(t => t > 0);
  const maxT = Math.max(...visTotals.filter(t => t > 0).concat([0]));
  const maxLocalIdx = visTotals.indexOf(maxT);
  const maxGlobalN = maxLocalIdx >= 0 ? visIndices[maxLocalIdx] + 1 : 0;
  const pastVis = visTotals.filter(t => t > 0);
  const minT = pastVis.length ? Math.min(...pastVis) : 0;
  const minLocalIdx = visTotals.indexOf(minT);
  const minGlobalN = minLocalIdx >= 0 ? visIndices[minLocalIdx] + 1 : 0;
  const periodLabel = activePeriod === 'all' ? 'весь год' : activePeriod === 'q1' ? 'Q1' : activePeriod === 'q2' ? 'Q2' : activePeriod === 'q3' ? 'Q3' : activePeriod === 'month' ? 'месяц' : 'неделя';

  document.getElementById('summary').innerHTML = `
    <div class="metric"><div class="metric-label">Доставок (${periodLabel})</div><div class="metric-val">${grandTotal > 0 ? fmt(grandTotal) : '—'}</div><div class="metric-sub">${filled.length} недель с данными</div></div>
    <div class="metric"><div class="metric-label">Ср. стоимость точки</div><div class="metric-val">${avgPrice > 0 ? avgPrice.toFixed(1) + ' ₽' : '—'}</div></div>
    <div class="metric"><div class="metric-label">Лучшая неделя</div><div class="metric-val">${maxT > 0 ? fmt(maxT) : '—'}</div><div class="metric-sub">${maxT > 0 ? 'нед. ' + maxGlobalN : ''}</div></div>
    <div class="metric"><div class="metric-label">Слабая неделя</div><div class="metric-val">${minT > 0 ? fmt(minT) : '—'}</div><div class="metric-sub">${minT > 0 ? 'нед. ' + minGlobalN : ''}</div></div>
    <div class="metric"><div class="metric-label">ФОТ (${periodLabel})</div><div class="metric-val">${totalZP > 0 ? (totalZP / 1000000).toFixed(2) + ' млн ₽' : '—'}</div></div>`;
}

function applyPeriodFilter(period) {
  activePeriod = period;
  const [r1, r2] = getVisibleRange();
  document.querySelectorAll('#tbody tr').forEach(tr => {
    const n = +tr.dataset.row;
    tr.style.display = (n >= r1 && n <= r2) ? '' : 'none';
  });
  renderSummary();
}

// City selector
const sel = document.getElementById('citySelect');
CITIES.forEach(c => {
  const o = document.createElement('option');
  o.value = c; o.textContent = c;
  sel.appendChild(o);
});
sel.addEventListener('change', function() {
  currentCity = this.value;
  initCity(currentCity);
  document.getElementById('yearLabel').textContent = '2026 — ' + currentCity.toUpperCase();
  renderTable();
  updateInfoBar();
});

// Period filter
document.getElementById('periodFilter').addEventListener('click', function(e) {
  const btn = e.target.closest('.pf-btn');
  if (!btn) return;
  document.querySelectorAll('.pf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyPeriodFilter(btn.dataset.period);
});

// Init
initCity(currentCity);
document.getElementById('yearLabel').textContent = '2026 — ' + currentCity.toUpperCase();
renderTable();
updateInfoBar();

// Zoom
let zoom = 100;
const tblWrap = document.getElementById('tblWrap');
function applyZoom() {
  tblWrap.style.transform = 'scale(' + (zoom/100) + ')';
  tblWrap.style.transformOrigin = 'top left';
  tblWrap.style.width = (10000/zoom) + '%';
  tblWrap.style.marginBottom = (-(100-zoom)*3) + 'px';
  document.getElementById('zoomLabel').textContent = zoom + '%';
}
document.getElementById('zoomIn').addEventListener('click', () => { zoom = Math.min(150, zoom+10); applyZoom(); });
document.getElementById('zoomOut').addEventListener('click', () => { zoom = Math.max(50, zoom-10); applyZoom(); });
document.getElementById('zoomReset').addEventListener('click', () => { zoom = 100; applyZoom(); });

// Brightness
const brightSlider = document.getElementById('brightSlider');
const brightVal = document.getElementById('brightVal');
brightSlider.addEventListener('input', function() {
  const v = +this.value;
  brightVal.textContent = v + '%';
  document.getElementById('tblWrap').style.filter = 'brightness(' + v + '%)';
});
</script>
</body>
</html>
