<div class="form-group"><label>Дата</label><input type="date" id="fDate" readonly style="background:var(--bg);color:var(--muted)"></div>
    <div class="form-group"><label>Время</label><input type="time" id="fTime" readonly style="background:var(--bg);color:var(--muted)"></div>
    <div class="form-group full"><label>ФИО</label><input type="text" id="fFio" placeholder="Иванов Иван Иванович"></div>
    <div class="form-group"><label>Телефон</label><input type="tel" id="fTel" placeholder="7 (900) 000-00-00"></div>
    <div class="form-group"><label>Округ</label>
      <select id="fOkrug"><option value="">—</option>
        <optgroup label="Санкт-Петербург">
          <option>СПБ : СЗ</option><option>СПБ : СВ</option><option>СПБ : ВОСТОК</option><option>СПБ : ЮВ</option><option>СПБ : ЮЗ</option>
        </optgroup>
        <optgroup label="Москва">
          <option>МСК : САО</option><option>МСК : СВАО</option><option>МСК : СЗАО</option><option>МСК : ВАО</option><option>МСК : ЮАО</option><option>МСК : ЮВАО</option><option>МСК : ЮЗАО</option><option>МСК : ЗАО</option>
        </optgroup>
      </select>
    </div>
    <div class="form-group"><label>Да/Нет</label>
      <select id="fDa"><option value="">—</option><option value="да">Да</option><option value="нет">Нет</option><option value="думает">Думает</option></select>
    </div>
    <div class="form-group"><label>Статус</label>
      <select id="fStatus"><option value="">—</option><option>думает</option><option>недозвон</option><option>отказ</option><option>принят</option><option>оформление</option><option>стажировка</option><option>резерв</option><option>жду доки</option><option>проверка СБ</option><option>передан в логистику</option></select>
    </div>
    <div class="form-group"><label>Юр. Статус</label>
      <select id="fJur"><option value="">—</option><option>СМЗ</option><option>ИП</option><option>ТД</option><option>ГПХ</option></select>
    </div>
    <div class="form-group"><label>Город</label>
      <select id="fCity"><option value="">—</option><option>Санкт-Петербург</option><option>Москва</option><option>Казань</option><option>Нижний Новгород</option><option>Воронеж</option><option>Другой</option></select>
    </div>
    <div class="form-group full"><label>Комментарий</label><textarea id="fComment" placeholder="Заметки..."></textarea></div>
  </div>
  <div class="modal-actions">
    <button class="btn-cancel" onclick="closeModal()">Отмена</button>
    <button class="btn-del" id="btnDel" style="display:none" onclick="deleteRow()">Удалить</button>
    <button class="btn-save" onclick="saveRow()">Сохранить</button>
  </div>
</div>
</div>

<!-- Avatar Modal -->
<div class="modal-bg" id="avatarModalBg">
<div class="av-modal">
  <h3>Фото профиля</h3>
  <div id="avPreview"></div>
  <input type="file" id="avatarFile" accept="image/*" style="display:none" onchange="saveAvatar(this)">
  <button class="btn-save" style="width:100%;margin-bottom:8px" onclick="document.getElementById('avatarFile').click()">Выбрать фото</button>
  <button class="btn-cancel" style="width:100%;margin-top:4px" onclick="document.getElementById('avatarModalBg').classList.remove('open')">Закрыть</button>
</div>
</div>

<script>
const SUPABASE_URL='https://orffvetweovwgowtprsv.supabase.co';
const SUPABASE_KEY='sb_publishable_NaTVWE-doecU4Au19gFLdg__qGD-fpH';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const EMAIL_MAP={
  'osipova@growfood.pro':'Осипова А.',
  'nasedko@growfood.pro':'Наседко Е.',
  'dupina@growfood.pro':'Дюпина Е.',
  'smolentseva@growfood.pro':'Смоленцева К.',
  'kislyakova@growfood.pro':'Кислякова Е.',
  'racheeva@growfood.pro':'Рачеева Д.',
  'stepakova@growfood.pro':'Степакова М.',
  'yakovleva@growfood.pro':'Яковлева А.',
  'a.yakovleva@growfood.pro':'Яковлева А.',
  'd.elsafadi@growfood.pro':'Эль-Сафади Д.',
  'ya.fedorova@growfood.pro':'Федорова Я.',
  's.fedorov@growfood.pro':'Федоров С.',
};
const ALL_RECRUITERS=['Осипова А.','Наседко Е.','Дюпина Е.','Смоленцева К.','Кислякова Е.','Рачеева Д.','Степакова М.','Яковлева А.'];
const ADMIN_EMAILS=['d.elsafadi@growfood.pro','ya.fedorova@growfood.pro','stepakova@growfood.pro','yakovleva@growfood.pro','a.yakovleva@growfood.pro','s.fedorov@growfood.pro'];
const SPB=['СПБ : СЗ','СПБ : СВ','СПБ : ВОСТОК','СПБ : ЮВ','СПБ : ЮЗ'];
const MSK=['МСК : САО','МСК : СВАО','МСК : СЗАО','МСК : ВАО','МСК : ЮАО','МСК : ЮВАО','МСК : ЮЗАО','МСК : ЗАО'];

let currentUser=null,isAdmin=false,myRecruiter=null;
let allRows=[],currentTab=0,editingRowId=null;
let filters={dateFrom:today(),dateTo:today(),okrug:'',da:'',status:'',city:'',fio:''};
let dragSrcId=null;

function today(){return new Date().toISOString().slice(0,10)}
function fmtDate(d){if(!d)return'—';const p=d.split('-');return p[2]+'.'+p[1]+'.'+p[0]}
function esc(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}
function cl(s){return(s||'').trim()}

// AUTH
async function doLogin(){
  const email=document.getElementById('lEmail').value.trim();
  const pass=document.getElementById('lPass').value;
  document.getElementById('loginErr').style.display='none';
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){document.getElementById('loginErr').style.display='block';return;}
  document.getElementById('loginWelcome').style.display='block';
  setTimeout(()=>initUser(data.user),1500);
}

async function doLogout(){
  await sb.auth.signOut();
  document.getElementById('appWrap').classList.add('hidden');
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('loginWelcome').style.display='none';
}

function initUser(user){
  currentUser=user;
  isAdmin=ADMIN_EMAILS.includes(user.email);
  myRecruiter=EMAIL_MAP[user.email]||user.email;
  document.getElementById('userEmail').textContent=myRecruiter;
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('appWrap').classList.remove('hidden');
  renderAvatar();
  if(!isAdmin){
    currentTab=ALL_RECRUITERS.indexOf(myRecruiter);
    if(currentTab<0)currentTab=0;
  }
  loadData();
  updatePresence();
  setInterval(updatePresence,30000);
  sb.channel('candidates').on('postgres_changes',{event:'*',schema:'public',table:'candidates'},()=>loadData()).subscribe();
  sb.channel('presence').on('postgres_changes',{event:'*',schema:'public',table:'user_presence'},()=>renderPresence()).subscribe();
}

sb.auth.getSession().then(({data})=>{if(data.session)initUser(data.session.user);});

// AVATAR
function avatarKey(){return'avatar_'+(currentUser?.email||'')}
function renderAvatar(){
  const src=localStorage.getItem(avatarKey());
  const initials=(myRecruiter||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const btn=document.getElementById('avatarBtn');
  btn.className='avatar-btn';
  btn.innerHTML=src?`<img src="${src}" alt="">`:`${initials}`;
}
function openAvatarModal(){
  const src=localStorage.getItem(avatarKey());
  const initials=(myRecruiter||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('avPreview').innerHTML=src
    ?`<img class="av-preview" src="${src}">`
    :`<div class="av-placeholder">${initials}</div>`;
  document.getElementById('avatarModalBg').classList.add('open');
}
function saveAvatar(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    localStorage.setItem(avatarKey(),e.target.result);
    renderAvatar();
    document.getElementById('avPreview').innerHTML=`<img class="av-preview" src="${e.target.result}">`;
  };
  r.readAsDataURL(file);
}

// PRESENCE
async function updatePresence(){
  if(!currentUser)return;
  await sb.from('user_presence').upsert({email:currentUser.email,name:myRecruiter,last_seen:new Date().toISOString()});
}
async function renderPresence(){
  const{data}=await sb.from('user_presence').select('*');
  if(!data)return;
  const now=new Date();
  document.querySelectorAll('.presence-dot').forEach(dot=>{
    const rec=dot.dataset.rec;
    const u=data.find(x=>x.name===rec);
    if(!u)return;
    const diff=Math.floor((now-new Date(u.last_seen))/1000);
    dot.style.background=diff<120?'#34c759':'#ccc';
    dot.title=diff<120?'Онлайн':'Был(а) '+fmtAgo(diff);
  });
}
function fmtAgo(s){if(s<60)return'только что';if(s<3600)return Math.floor(s/60)+' мин назад';if(s<86400)return Math.floor(s/3600)+' ч назад';return Math.floor(s/86400)+' дн назад';}

function setSyncStatus(state,msg){
  const el=document.getElementById('syncStatus');
  el.className='sync-pill sync-'+state;
  el.textContent=msg;
}

async function loadData(){
  setSyncStatus('loading','загрузка...');
  const{data,error}=await sb.from('candidates').select('*').order('sort_order',{ascending:true}).order('created_at',{ascending:true});
  if(error){setSyncStatus('err','ошибка');return;}
  allRows=data||[];
  setSyncStatus('ok','● онлайн');
  render();
}

function render(){renderTabs();renderFilters();const rows=filteredRows();renderStats(rows);renderTable(rows);renderCards(rows);}

function getRecruiters(){return isAdmin?ALL_RECRUITERS:[myRecruiter];}

function renderTabs(){
  const recs=getRecruiters();
  document.getElementById('tabsWrap').innerHTML=recs.map((r,i)=>
    `<div class="tab ${i===currentTab?'active':''}" onclick="switchTab(${i})">${r}<span class="presence-dot" data-rec="${r}"></span></div>`
  ).join('');
  renderPresence();
}

function renderFilters(){
  const canAdd=isAdmin||myRecruiter===getRecruiters()[currentTab];
  document.getElementById('filtersBar').innerHTML=`
    <div class="filter-row">
      <div class="f-item"><label>ФИО</label><input class="f-input f-input-wide" type="text" value="${esc(filters.fio)}" placeholder="Поиск..." oninput="filters.fio=this.value;render()"></div>
      <div class="f-item"><label>С</label><input class="f-input f-input-date" type="date" value="${filters.dateFrom}" onchange="filters.dateFrom=this.value;render()"></div>
      <div class="f-item"><label>По</label><input class="f-input f-input-date" type="date" value="${filters.dateTo}" onchange="filters.dateTo=this.value;render()"></div>
    </div>
    <div class="filter-row">
      <div class="f-item"><label>Округ</label>
        <select class="f-input" onchange="filters.okrug=this.value;render()">
          <option value="">Все</option>
          <optgroup label="СПБ">${SPB.map(o=>`<option ${filters.okrug===o?'selected':''}>${o}</option>`).join('')}</optgroup>
          <optgroup label="МСК">${MSK.map(o=>`<option ${filters.okrug===o?'selected':''}>${o}</option>`).join('')}</optgroup>
        </select>
      </div>
      <div class="f-item"><label>Да/Нет</label>
        <select class="f-input" onchange="filters.da=this.value;render()">
          <option value="">Все</option>
          <option ${filters.da==='да'?'selected':''} value="да">Да</option>
          <option ${filters.da==='нет'?'selected':''} value="нет">Нет</option>
          <option ${filters.da==='думает'?'selected':''} value="думает">Думает</option>
        </select>
      </div>
      <div class="f-item"><label>Статус</label>
        <select class="f-input" onchange="filters.status=this.value;render()">
          <option value="">Все</option>
          ${['думает','недозвон','отказ','принят','оформление','стажировка','резерв','жду доки','проверка СБ','передан в логистику'].map(o=>`<option ${filters.status===o?'selected':''}>${o}</option>`).join('')}
        </select>
      </div>
      <div class="f-item"><label>Город</label>
        <select class="f-input" onchange="filters.city=this.value;render()">
          <option value="">Все</option>
          ${['Санкт-Петербург','Москва','Казань','Нижний Новгород','Воронеж'].map(o=>`<option ${filters.city===o?'selected':''}>${o}</option>`).join('')}
        </select>
      </div>
      <button class="btn-clear" onclick="clearFilters()">Сбросить</button>
      ${canAdd?`<button class="btn-add" onclick="openModal()">+ Запись</button>`:''}
    </div>
  `;
}

function filteredRows(){
  const rec=getRecruiters()[currentTab]||getRecruiters()[0];
  return allRows.filter(r=>{
    if(r.recruiter!==rec)return false;
    if(filters.fio&&!r.fio?.toLowerCase().includes(filters.fio.toLowerCase()))return false;
    if(filters.dateFrom&&r.date<filters.dateFrom)return false;
    if(filters.dateTo&&r.date>filters.dateTo)return false;
    if(filters.okrug&&r.okrug!==filters.okrug)return false;
    if(filters.da&&r.da!==filters.da)return false;
    if(filters.status&&r.status!==filters.status)return false;
    if(filters.city&&r.city!==filters.city)return false;
    return true;
  });
}

function renderStats(rows){
  const total=rows.length,yes=rows.filter(r=>r.da==='да').length,no=rows.filter(r=>r.da==='нет').length,think=rows.filter(r=>r.da==='думает').length,pct=total?Math.round(yes/total*100):0;
  document.getElementById('statsBar').innerHTML=`
    <div class="stat"><span class="stat-val">${total}</span><span class="stat-label">всего</span></div>
    <div class="stat yes"><span class="stat-val">${yes}</span><span class="stat-label">да (${pct}%)</span></div>
    <div class="stat no"><span class="stat-val">${no}</span><span class="stat-label">нет</span></div>
    <div class="stat"><span class="stat-val">${think}</span><span class="stat-label">думают</span></div>
  `;
}

function statusClass(s){
  const map={'думает':'dumaet','недозвон':'nedozvon','отказ':'otkaz','принят':'prinyat','оформление':'oformlenie','стажировка':'stazhirovka','резерв':'rezerv','жду доки':'zhdu','проверка СБ':'sb','передан в логистику':'logistic'};
  return map[s]||'empty';
}

function daBadge(v){
  if(v==='да')return'<span class="chip da-yes">Да</span>';
  if(v==='нет')return'<span class="chip da-no">Нет</span>';
  if(v==='думает')return'<span class="chip da-think">Думает</span>';
  return'<span class="chip s-empty">—</span>';
}

const COLS=[{key:'date',label:'Дата'},{key:'time',label:'Время'},{key:'fio',label:'ФИО'},{key:'tel',label:'Тел'},{key:'okrug',label:'Округ'},{key:'da',label:'Да/Нет'},{key:'status',label:'Статус'},{key:'jur',label:'Юр.Статус'},{key:'city',label:'Город'},{key:'comment',label:'Комментарий'}];

function renderTable(rows){
  document.getElementById('thead').innerHTML='<tr><th></th>'+COLS.map(c=>`<th>${c.label}</th>`).join('')+'<th></th></tr>';
  if(!rows.length){document.getElementById('tbody').innerHTML=`<tr><td colspan="${COLS.length+2}"><div class="empty-state">Нет записей за выбранный период</div></td></tr>`;return;}
  document.getElementById('tbody').innerHTML=rows.map(r=>`
    <tr class="row-${statusClass(r.status)}" draggable="true" data-id="${r.id}" ondblclick="openEditModal('${r.id}')">
      <td><span class="drag-handle">⠿</span></td>
      <td>${fmtDate(r.date)}</td><td>${r.time||'—'}</td>
      <td style="font-weight:600">${r.fio||'—'}</td>
      <td>${r.tel||'—'}</td><td>${r.okrug||'—'}</td>
      <td>${daBadge(r.da)}</td>
      <td>${r.status?`<span class="chip s-${statusClass(r.status)}">${r.status}</span>`:'—'}</td>
      <td>${r.jur||'—'}</td><td>${r.city||'—'}</td>
      <td style="color:var(--muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(r.comment)}">${r.comment||'—'}</td>
      <td><button style="background:none;border:none;cursor:pointer;color:var(--blue);font-size:14px" onclick="openEditModal('${r.id}')">✏️</button></td>
    </tr>
  `).join('');
  initDrag();
}

function renderCards(rows){
  const wrap=document.getElementById('cardsWrap');
  if(!rows.length){wrap.innerHTML=`<div class="empty-state">Нет записей за выбранный период</div>`;return;}
  wrap.innerHTML=rows.map(r=>`
    <div class="card row-${statusClass(r.status)}" onclick="openEditModal('${r.id}')">
      <div class="card-top">
        <div class="card-name">${r.fio||'—'}</div>
        <div class="card-time">${fmtDate(r.date)} ${r.time||''}</div>
      </div>
      <div class="card-tel">${r.tel||'—'}</div>
      <div class="card-meta">
        ${r.okrug?`<span class="chip s-empty">${r.okrug}</span>`:''}
        ${daBadge(r.da)}
        ${r.status?`<span class="chip s-${statusClass(r.status)}">${r.status}</span>`:''}
        ${r.jur?`<span class="chip s-empty">${r.jur}</span>`:''}
        ${r.city?`<span class="chip s-empty">${r.city}</span>`:''}
      </div>
      ${r.comment?`<div style="font-size:12px;color:var(--muted);margin-top:6px">${r.comment}</div>`:''}
    </div>
  `).join('');
}

function initDrag(){
  document.querySelectorAll('#tbody tr[draggable]').forEach(row=>{
    row.addEventListener('dragstart',e=>{dragSrcId=row.dataset.id;row.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    row.addEventListener('dragend',()=>{row.classList.remove('dragging');document.querySelectorAll('#tbody tr').forEach(r=>r.classList.remove('drag-over'));});
    row.addEventListener('dragover',e=>{e.preventDefault();document.querySelectorAll('#tbody tr').forEach(r=>r.classList.remove('drag-over'));row.classList.add('drag-over');});
    row.addEventListener('drop',async e=>{
      e.preventDefault();row.classList.remove('drag-over');
      if(dragSrcId===row.dataset.id)return;
      const src=allRows.find(r=>r.id===dragSrcId),dst=allRows.find(r=>r.id===row.dataset.id);
      if(!src||!dst)return;
      await sb.from('candidates').update({sort_order:dst.sort_order??0}).eq('id',dragSrcId);
      await sb.from('candidates').update({sort_order:src.sort_order??0}).eq('id',row.dataset.id);
      await loadData();
    });
  });
}

function fmtDateTime(){const n=new Date();return{date:n.toISOString().slice(0,10),time:String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')};}
function clearFilters(){filters={dateFrom:today(),dateTo:today(),okrug:'',da:'',status:'',city:'',fio:''};render();}
function switchTab(i){currentTab=i;filters={dateFrom:today(),dateTo:today(),okrug:'',da:'',status:'',city:'',fio:''};render();}

function openModal(){
  editingRowId=null;
  document.getElementById('modalTitle').textContent='Новая запись';
  document.getElementById('btnDel').style.display='none';
  const dt=fmtDateTime();
  document.getElementById('fDate').value=dt.date;
  document.getElementById('fTime').value=dt.time;
  ['fFio','fTel','fComment'].forEach(id=>document.getElementById(id).value='');
  ['fOkrug','fDa','fStatus','fJur','fCity'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('modalBg').classList.add('open');
  setTimeout(()=>document.getElementById('fFio').focus(),300);
}

function openEditModal(id){
  const r=allRows.find(x=>x.id===id);if(!r)return;
  editingRowId=id;
  document.getElementById('modalTitle').textContent='Редактировать';
  document.getElementById('btnDel').style.display='';
  document.getElementById('fDate').value=r.date||'';
  document.getElementById('fTime').value=r.time||'';
  document.getElementById('fFio').value=r.fio||'';
  document.getElementById('fTel').value=r.tel||'';
  document.getElementById('fOkrug').value=r.okrug||'';
  document.getElementById('fDa').value=r.da||'';
  document.getElementById('fStatus').value=r.status||'';
  document.getElementById('fJur').value=r.jur||'';
  document.getElementById('fCity').value=r.city||'';
  document.getElementById('fComment').value=r.comment||'';
  document.getElementById('modalBg').classList.add('open');
}

function closeModal(){document.getElementById('modalBg').classList.remove('open');}

async function saveRow(){
  const rec=getRecruiters()[currentTab]||getRecruiters()[0];
  const data={recruiter:rec,date:document.getElementById('fDate').value,time:document.getElementById('fTime').value,fio:document.getElementById('fFio').value,tel:document.getElementById('fTel').value,okrug:document.getElementById('fOkrug').value,da:document.getElementById('fDa').value,status:document.getElementById('fStatus').value,jur:document.getElementById('fJur').value,city:document.getElementById('fCity').value,comment:document.getElementById('fComment').value};
  if(editingRowId){await sb.from('candidates').update(data).eq('id',editingRowId);}
  else{await sb.from('candidates').insert(data);}
  closeModal();await loadData();
}

async function deleteRow(){
  if(!editingRowId)return;
  if(!confirm('Удалить запись?'))return;
  await sb.from('candidates').delete().eq('id',editingRowId);
  closeModal();await loadData();
}

document.getElementById('modalBg').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('avatarModalBg').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
</script>
</body>
</html>
