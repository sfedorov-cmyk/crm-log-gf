<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HR GF</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22><rect width=%2232%22 height=%2232%22 rx=%228%22 fill=%22%2334c759%22/><text y=%2224%22 x=%224%22 font-size=%2220%22 font-family=%22Arial%22 font-weight=%22bold%22 fill=%22white%22>HR</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#f2f2f7;--surface:#fff;--border:#e5e5ea;--border2:#d1d1d6;--text:#1c1c1e;--muted:#8e8e93;--accent:#34c759;--accent-dark:#248a3d;--blue:#007aff;--red:#ff3b30;--r:12px;--rs:8px;--rl:16px;--sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);--shm:0 4px 16px rgba(0,0,0,.12);}
body,html{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;height:100%;-webkit-font-smoothing:antialiased}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#e8f5e9,#f2f2f7)}
.login-box{background:var(--surface);border-radius:20px;padding:36px 32px;width:360px;max-width:92vw;box-shadow:var(--shm)}
.login-logo{font-size:26px;font-weight:700;color:var(--accent-dark);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.login-group{margin-bottom:14px}
.login-group label{display:block;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:6px}
.login-group input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rs);padding:11px 14px;font-family:inherit;font-size:15px;color:var(--text);outline:none}
.login-group input:focus{border-color:var(--accent)}
.login-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);padding:13px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px}
.login-err{color:var(--red);font-size:12px;margin-top:10px;text-align:center;display:none}
.login-ok{color:var(--accent-dark);font-size:13px;font-weight:500;margin-top:12px;text-align:center;padding:10px;background:#e8f5e9;border-radius:var(--rs);display:none}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:52px}
.logo{font-size:17px;font-weight:700;color:var(--accent-dark);padding-right:12px;border-right:1px solid var(--border);margin-right:4px;white-space:nowrap}
.sync-pill{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap}
.sync-ok{background:#e8f5e9;color:var(--accent-dark)}.sync-err{background:#ffe5e5;color:var(--red)}.sync-loading{background:#fff8e0;color:#7a5c1a}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.avatar-btn{width:34px;height:34px;border-radius:50%;cursor:pointer;flex-shrink:0;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:0}
.avatar-btn img{width:100%;height:100%;object-fit:cover}
.cal-btn{width:34px;height:34px;border-radius:50%;cursor:pointer;flex-shrink:0;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center;position:relative}
.cal-badge{position:absolute;top:-2px;right:-2px;width:10px;height:10px;background:var(--red);border-radius:50%;display:none}
.user-name{font-size:13px;color:var(--muted)}
@media(max-width:480px){.user-name{display:none}}
.btn-out{font-size:12px;font-weight:500;padding:5px 11px;border:1.5px solid var(--border2);border-radius:20px;background:transparent;color:var(--muted);cursor:pointer}
.tabs-wrap{background:var(--surface);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;flex-shrink:0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tabs-wrap::-webkit-scrollbar{display:none}
.tab{padding:10px 14px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;color:var(--muted);flex-shrink:0;display:flex;align-items:center;gap:5px;transition:color .15s,border-color .15s}
.tab.active{color:var(--accent-dark);border-bottom-color:var(--accent)}
.pdot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0}
.filters{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.frow{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.flabel{font-size:11px;font-weight:500;color:var(--muted);white-space:nowrap}
.finput{border:1.5px solid var(--border);border-radius:var(--rs);padding:6px 8px;font-family:inherit;font-size:12px;background:var(--bg);color:var(--text);outline:none;max-width:100%}
.finput:focus{border-color:var(--accent)}
.finput-wide{width:130px}.finput-date{width:126px}
.btn-reset{font-size:12px;font-weight:500;padding:6px 12px;border:1.5px solid var(--border2);border-radius:20px;background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap}
.btn-new{font-size:13px;font-weight:600;padding:7px 16px;border:none;border-radius:20px;background:var(--accent);color:#fff;cursor:pointer;white-space:nowrap;margin-left:auto}
.bulk-bar{display:none;background:#1c1c1e;padding:10px 14px;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.bulk-bar.show{display:flex}
.bulk-info{font-size:13px;font-weight:500;color:#fff}
.bulk-btn{font-size:12px;font-weight:500;padding:6px 14px;border:none;border-radius:20px;cursor:pointer;font-family:inherit}
.bulk-del{background:#ff3b30;color:#fff}.bulk-move{background:#007aff;color:#fff}.bulk-clear{background:transparent;color:#8e8e93;border:1px solid #3a3a3c}
.stats-bar{display:flex;gap:8px;padding:8px 12px;background:var(--bg);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.stats-bar::-webkit-scrollbar{display:none}
.stat{background:var(--surface);border-radius:var(--r);padding:7px 14px;display:flex;align-items:baseline;gap:6px;box-shadow:var(--sh);flex-shrink:0}
.sv{font-size:20px;font-weight:700}.sl{font-size:11px;color:var(--muted)}
.stat.yes .sv{color:var(--accent)}.stat.no .sv{color:var(--red)}
.table-wrap{flex:1;overflow:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{position:sticky;top:0;z-index:2}
th{background:#f2f2f7;border-bottom:1px solid var(--border);padding:8px 10px;text-align:left;font-weight:600;font-size:11px;color:var(--muted);white-space:nowrap;text-transform:uppercase;letter-spacing:.3px}
td{border-bottom:1px solid var(--border);padding:10px 10px;vertical-align:middle}
tr:hover td{background:#f9f9f9}
tr.selected td{background:#e8f5e9!important}
.cards-wrap{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px;gap:10px;flex-direction:column}
.card{background:var(--surface);border-radius:var(--rl);padding:14px 16px;box-shadow:var(--sh);cursor:pointer;position:relative}
.card.selected{border:2px solid var(--accent)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.card-name{font-size:15px;font-weight:600}.card-time{font-size:12px;color:var(--muted)}
.card-tel{font-size:13px;color:var(--blue);margin-bottom:8px;cursor:pointer}
.card-chips{display:flex;gap:5px;flex-wrap:wrap}.card-comment{font-size:12px;color:var(--muted);margin-top:6px}
.card-check{position:absolute;top:12px;right:12px;width:22px;height:22px;border-radius:50%;border:2px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
.card.selected .card-check{background:var(--accent);border-color:var(--accent);color:#fff}
.chip{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.c-empty{background:#f2f2f7;color:var(--muted)}.c-da-yes{background:#e5f9ee;color:#1a7a4a}.c-da-no{background:#ffe5e5;color:#c0392b}.c-da-think{background:#fff4e0;color:#b06000}
.c-dumaet{background:#eef2ff;color:#3730a3}.c-nedozvon{background:#f2f2f7;color:#8e8e93}.c-otkaz{background:#fef2f2;color:#b91c1c}.c-prinyat{background:#f0fdf4;color:#15803d}
.c-oformlenie{background:#ecfeff;color:#0e7490}.c-stazhirovka{background:#faf5ff;color:#7e22ce}.c-rezerv{background:#dbeafe;color:#1d4ed8}
.c-zhdu{background:#fce7f3;color:#9d174d}.c-sb{background:#fef9c3;color:#854d0e}.c-logistic{background:#dcfce7;color:#15803d}
.r-dumaet td{background:#f8f9ff!important}.r-nedozvon td{background:#f9f9f9!important}.r-otkaz td{background:#fff5f5!important}.r-prinyat td{background:#f0fdf4!important}
.r-oformlenie td{background:#f0fbfd!important}.r-stazhirovka td{background:#fdf8ff!important}.r-rezerv td{background:#eff6ff!important}
.r-zhdu td{background:#fdf2f8!important}.r-sb td{background:#fefce8!important}.r-logistic td{background:#dcfce7!important}
.r-dumaet{background:#f8f9ff}.r-nedozvon{background:#f9f9f9}.r-otkaz{background:#fff5f5}.r-prinyat{background:#f0fdf4}
.r-oformlenie{background:#f0fbfd}.r-stazhirovka{background:#fdf8ff}.r-rezerv{background:#eff6ff}.r-zhdu{background:#fdf2f8}.r-sb{background:#fefce8}.r-logistic{background:#dcfce7}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
@media(min-width:600px){.modal-bg{align-items:center}}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 20px 36px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto}
@media(min-width:600px){.modal{border-radius:20px;padding:24px}}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
@media(min-width:600px){.modal-handle{display:none}}
.modal h3{font-size:17px;font-weight:700;margin-bottom:18px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:5px}.fg.full{grid-column:1/-1}
.fg label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.fg input,.fg select,.fg textarea{border:1.5px solid var(--border);border-radius:var(--rs);padding:10px 12px;font-family:inherit;font-size:14px;color:var(--text);outline:none;background:var(--bg);-webkit-appearance:none;appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);background:#fff}
.fg textarea{resize:vertical;min-height:80px}.fg input[readonly]{background:#f2f2f7;color:var(--muted)}
.modal-btns{display:flex;gap:8px;margin-top:20px}
.btn-save{flex:1;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);padding:13px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-cancel{background:var(--bg);color:var(--muted);border:none;border-radius:var(--rs);padding:13px 16px;font-size:14px;cursor:pointer;font-family:inherit}
.btn-del{background:#fff0f0;color:var(--red);border:none;border-radius:var(--rs);padding:13px 14px;font-size:14px;cursor:pointer;font-family:inherit}
.move-modal{background:var(--surface);border-radius:20px;padding:24px;width:320px}
.move-modal h3{font-size:16px;font-weight:700;margin-bottom:16px}
.av-wrap{background:var(--surface);border-radius:20px;padding:24px;width:300px;text-align:center}
.av-wrap h3{font-size:16px;font-weight:700;margin-bottom:16px}
.av-img{width:80px;height:80px;border-radius:50%;margin:0 auto 16px;object-fit:cover;display:block}
.av-ph{width:80px;height:80px;border-radius:50%;margin:0 auto 16px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700}
.drag-handle{color:#ccc;padding:0 4px;font-size:16px;cursor:grab;user-select:none}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.hidden{display:none!important}
input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--accent)}
.tel-wrap{display:flex;align-items:stretch;border:1.5px solid var(--border);border-radius:var(--rs);overflow:hidden;background:var(--bg);transition:border-color .2s}
.tel-wrap:focus-within{border-color:var(--accent)}
.tel-prefix{font-size:14px;font-weight:500;color:var(--text);padding:10px 10px;background:#e8e8ed;border-right:1px solid var(--border);white-space:nowrap;display:flex;align-items:center;user-select:none}
.tel-input{border:none!important;border-radius:0!important;background:var(--bg)!important;flex:1;padding:10px 12px;font-family:inherit;font-size:14px;color:var(--text);outline:none}
.cal-modal-wrap{background:var(--surface);border-radius:20px;width:380px;max-width:96vw;max-height:90vh;overflow-y:auto;padding:20px}
.cal-modal-wrap h3{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.cal-nav{display:flex;align-items:center;gap:8px}
.cal-nav button{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);padding:2px 6px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:12px}
.cal-day-header{font-size:10px;font-weight:600;color:var(--muted);text-align:center;padding:4px 0;text-transform:uppercase}
.cal-day{font-size:12px;text-align:center;padding:6px 2px;border-radius:8px;cursor:pointer;position:relative;min-height:36px;display:flex;flex-direction:column;align-items:center;gap:2px}
.cal-day:hover{background:var(--bg)}.cal-day.today{background:var(--accent);color:#fff;font-weight:700}
.cal-day.today:hover{background:var(--accent-dark)}.cal-day.selected{background:#e8f5e9;color:var(--accent-dark);font-weight:600}
.cal-day.weekend{color:var(--red)}.cal-day.holiday{color:var(--red);font-weight:600}.cal-day.other-month{color:#ccc}
.cal-day-dot{width:5px;height:5px;border-radius:50%;background:var(--blue)}
.cal-notes{border-top:1px solid var(--border);padding-top:12px}
.cal-notes-title{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.3px}
.cal-note-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:var(--rs);margin-bottom:6px}
.cal-note-time{font-size:12px;font-weight:600;color:var(--blue);white-space:nowrap}
.cal-note-text{font-size:13px;flex:1}
.cal-note-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 2px}
.cal-note-del:hover{color:var(--red)}
.cal-add-note{display:flex;gap:6px;margin-top:8px}
.cal-add-note input{flex:1;border:1.5px solid var(--border);border-radius:var(--rs);padding:8px 10px;font-family:inherit;font-size:13px;outline:none}
.cal-add-note input:focus{border-color:var(--accent)}
.cal-add-note select{border:1.5px solid var(--border);border-radius:var(--rs);padding:8px 8px;font-family:inherit;font-size:13px;outline:none;background:var(--bg);-webkit-appearance:none}
.cal-add-note button{background:var(--accent);color:#fff;border:none;border-radius:var(--rs);padding:8px 12px;cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap}
.reminder-popup{position:fixed;top:70px;right:16px;background:var(--surface);border:1.5px solid var(--accent);border-radius:16px;padding:16px 20px;box-shadow:var(--shm);z-index:9999;max-width:320px;animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
.reminder-popup h4{font-size:14px;font-weight:600;color:var(--accent-dark);margin-bottom:4px}
.reminder-popup p{font-size:13px;color:var(--text);margin-bottom:10px}
.reminder-popup button{font-size:12px;padding:5px 14px;border:none;border-radius:20px;background:var(--accent);color:#fff;cursor:pointer}
.period-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.period-btn{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg);color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.period-btn.active{background:var(--accent-dark);color:#fff;border-color:var(--accent-dark)}
.period-custom{display:flex;gap:6px;align-items:center}
.period-custom input{border:1.5px solid var(--border);border-radius:var(--rs);padding:5px 8px;font-family:inherit;font-size:12px;background:var(--bg);color:var(--text);outline:none}
.period-custom input:focus{border-color:var(--accent)}
.btn-refresh{padding:6px 14px;border-radius:20px;border:none;background:var(--accent);color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px}
.btn-refresh:active{opacity:.8}
/* INFO SECTION */
.info-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px}
.info-section{background:var(--surface);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:var(--sh)}
.info-section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.info-section-title{font-size:14px;font-weight:700;color:var(--text)}
.info-edit-btn{font-size:11px;font-weight:500;padding:4px 12px;border:1.5px solid var(--border2);border-radius:20px;background:transparent;color:var(--muted);cursor:pointer;font-family:inherit}
.info-edit-btn.editing{background:var(--accent);color:#fff;border-color:var(--accent)}
.info-updated{font-size:11px;color:var(--muted)}
.info-textarea{width:100%;border:1.5px solid var(--border);border-radius:var(--rs);padding:10px 12px;font-family:inherit;font-size:13px;color:var(--text);background:var(--bg);outline:none;resize:vertical;min-height:80px;line-height:1.6}
.info-textarea:focus{border-color:var(--accent);background:#fff}
.info-textarea[readonly]{background:var(--bg);border-color:transparent;cursor:default;color:var(--text)}
.info-table{width:100%;border-collapse:collapse;font-size:13px}
.info-table th{background:#f2f2f7;padding:8px 10px;text-align:left;font-weight:600;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.3px}
.info-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.info-table tr:last-child td{border-bottom:none}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.info-card{background:var(--bg);border-radius:var(--r);padding:12px 14px}
.info-card-title{font-size:12px;font-weight:600;color:var(--accent-dark);margin-bottom:6px}
.info-script-item{padding:10px 0;border-bottom:1px solid var(--border)}
.info-script-item:last-child{border-bottom:none}
.info-script-num{font-size:12px;font-weight:700;color:var(--accent-dark);margin-bottom:4px}
.info-script-text{font-size:13px;color:var(--text);line-height:1.5}
.status-legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.status-dot{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:4px;vertical-align:middle}
@media(max-width:599px){.table-wrap{display:none}.cards-wrap{display:flex}.info-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">HR GF</div>
    <div class="login-sub">Система подбора курьеров</div>
    <div class="login-group"><label>Email</label><input type="email" id="lEmail" placeholder="your@growfood.pro"></div>
    <div class="login-group"><label>Пароль</label><input type="password" id="lPass" placeholder="••••••••"></div>
    <button class="login-btn" id="loginBtn">Войти</button>
    <div class="login-err" id="loginErr">Неверный email или пароль</div>
    <div class="login-ok" id="loginOk">Добро пожаловать! Продуктивного дня 🌿</div>
  </div>
</div>
<div class="app hidden" id="appWrap">
  <div class="topbar">
    <div class="logo">HR GF</div>
    <span class="sync-pill sync-loading" id="syncStatus">загрузка...</span>
    <div class="topbar-right">
      <span id="queueBadge" style="display:none;font-size:11px;background:#fff3cd;color:#856404;padding:3px 8px;border-radius:20px;font-weight:500"></span>

function getQueue(){try{return JSON.parse(localStorage.getItem(QKEY)||'[]')}catch{return[]}}
function saveQueue(q){localStorage.setItem(QKEY,JSON.stringify(q))}
function addToQueue(op){const q=getQueue();q.push({...op,qid:Date.now().toString(36)+Math.random().toString(36).slice(2)});saveQueue(q);showOfflineBanner()}
function showOfflineBanner(){
  const q=getQueue();const b=document.getElementById('offlineBanner');if(!b)return;
  if(!isOnline){b.innerHTML='🔴 Офлайн режим — изменения сохранятся при подключении';b.style.display='block';b.style.background='#fff3cd';b.style.color='#856404';}
  else if(q.length>0){b.innerHTML=`🔄 Синхронизация... (${q.length}) <button onclick="localStorage.removeItem('hrcrm_queue');showOfflineBanner();" style="margin-left:8px;padding:2px 10px;border:none;border-radius:12px;background:#084298;color:#fff;font-size:11px;cursor:pointer">Сбросить</button>`;b.style.display='block';b.style.background='#cfe2ff';b.style.color='#084298';}
  else{b.style.display='none';}
  const el=document.getElementById('queueBadge');if(el){el.textContent=q.length?`📤 ${q.length}`:'';el.style.display=q.length?'block':'none';}
}
async function syncQueue(){
  const q=getQueue();if(!q.length){showOfflineBanner();return;}
  const done=[];
  for(const op of q){try{
    if(op.type==='insert'){const{error}=await sb.from('candidates').insert(op.data);if(!error)done.push(op.qid)}
    if(op.type==='update'){const{error}=await sb.from('candidates').update(op.data).eq('id',op.rowId);if(!error)done.push(op.qid)}
    if(op.type==='delete'){const{error}=await sb.from('candidates').delete().eq('id',op.rowId);if(!error)done.push(op.qid)}
  }catch(e){}}
  if(done.length){saveQueue(getQueue().filter(op=>!done.includes(op.qid)));if(!getQueue().length){const b=document.getElementById('offlineBanner');if(b){b.innerHTML='✅ Синхронизация завершена!';b.style.background='#d1e7dd';b.style.color='#0a3622';setTimeout(()=>showOfflineBanner(),2000);}}await loadData();}else showOfflineBanner();
}
window.addEventListener('online',()=>{isOnline=true;showOfflineBanner();syncQueue();loadData()});
window.addEventListener('offline',()=>{isOnline=false;showOfflineBanner()});

const MONTHS_RU=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const DAYS_RU=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
function renderCalendar(){
  document.getElementById('calMonthTitle').textContent=`${MONTHS_RU[calMonth]} ${calYear}`;
  const grid=document.getElementById('calGrid');
  grid.innerHTML=DAYS_RU.map(d=>`<div class="cal-day-header">${d}</div>`).join('');
  const first=new Date(calYear,calMonth,1);let startDow=(first.getDay()+6)%7;
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const prevDays=new Date(calYear,calMonth,0).getDate();const todayStr=td();
  for(let i=startDow-1;i>=0;i--){grid.innerHTML+=`<div class="cal-day other-month">${prevDays-i}</div>`;}
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const mmdd=dateStr.slice(5);const isHoliday=RU_HOLIDAYS.includes(mmdd);
    const dow=new Date(calYear,calMonth,d).getDay();const isWeekend=dow===0||dow===6;
    const isToday=dateStr===todayStr;const isSel=dateStr===calSelectedDate;
    const hasNote=calNotes.some(n=>n.date===dateStr);
    const cls=['cal-day',isToday?'today':'',isSel&&!isToday?'selected':'',isHoliday?'holiday':isWeekend?'weekend':''].filter(Boolean).join(' ');
    grid.innerHTML+=`<div class="${cls}" onclick="calSelectDate('${dateStr}')">${d}${hasNote?'<div class="cal-day-dot"></div>':''}</div>`;
  }
  const total=startDow+daysInMonth;const rem=(7-total%7)%7;
  for(let d=1;d<=rem;d++){grid.innerHTML+=`<div class="cal-day other-month">${d}</div>`;}
  renderCalNotes();
}
function calSelectDate(dateStr){calSelectedDate=dateStr;renderCalendar();}
function renderCalNotes(){
  const notes=calNotes.filter(n=>n.date===calSelectedDate).sort((a,b)=>a.time.localeCompare(b.time));
  document.getElementById('calNotesTitle').textContent=`Заметки на ${fd(calSelectedDate)}`;
  const list=document.getElementById('calNotesList');
  if(!notes.length){list.innerHTML=`<div style="font-size:12px;color:var(--muted);padding:8px 0">Нет заметок</div>`;return;}
  list.innerHTML=notes.map(n=>`<div class="cal-note-item"><span class="cal-note-time">${n.time}</span><span class="cal-note-text">${esc(n.note)}</span><button class="cal-note-del" onclick="delCalNote('${n.id}')">✕</button></div>`).join('');
}
function delCalNote(id){calNotes=calNotes.filter(n=>n.id!==id);saveCalNotes();renderCalendar();}
document.getElementById('calNoteAddBtn').onclick=()=>{
  const text=document.getElementById('calNoteInput').value.trim();const time=document.getElementById('calNoteTime').value;
  if(!text)return;calNotes.push({id:Date.now().toString(36),date:calSelectedDate,time,note:text,shown:false});
  saveCalNotes();document.getElementById('calNoteInput').value='';renderCalendar();
};

document.getElementById('calNext').onclick=()=>{calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar()};

document.getElementById('calBtn').onclick=()=>{renderCalendar();document.getElementById('calModalBg').classList.add('open')};
document.getElementById('calModalBg').onclick=function(e){if(e.target===this)this.classList.remove('open')};

function initUser(user){
  CU=user;isAdmin=ADMINS.includes(user.email);myRec=EMAP[user.email]||user.email;
  document.getElementById('userName').textContent=myRec;
  document.getElementById('loginWrap').style.display='none';document.getElementById('appWrap').classList.remove('hidden');
  renderAvatar();if(!isAdmin){tab=ALL_R.indexOf(myRec);if(tab<0)tab=0}
  loadCalNotes();
  sb.from('screen_time').select('seconds').eq('email',user.email).eq('date',td()).single().then(({data})=>{if(data)screenSeconds=data.seconds||0;});
  loadData();updatePresence();setInterval(updatePresence,30000);
  sb.channel('c1').on('postgres_changes',{event:'*',schema:'public',table:'candidates'},()=>loadData()).subscribe();
  sb.channel('c2').on('postgres_changes',{event:'*',schema:'public',table:'user_presence'},()=>renderPresence()).subscribe();
  setInterval(syncQueue,30000);
}
sb.auth.getSession().then(({data})=>{if(data?.session)initUser(data.session.user)});

async function updatePresence(){if(!CU)return;await sb.from('user_presence').upsert({email:CU.email,name:myRec,last_seen:new Date().toISOString()})}
async function renderPresence(){const{data}=await sb.from('user_presence').select('*');if(!data)return;const now=new Date();document.querySelectorAll('.pdot').forEach(dot=>{const u=data.find(x=>x.name===dot.dataset.rec);if(!u)return;const diff=Math.floor((now-new Date(u.last_seen))/1000);dot.style.background=diff<120?'#34c759':'#ccc';dot.title=diff<120?'Онлайн':fmtAgo(diff);});}
function fmtAgo(s){if(s<60)return'только что';if(s<3600)return Math.floor(s/60)+' мин назад';return Math.floor(s/3600)+' ч назад'}

async function loadData(){
  setSyncing('loading','загрузка...');
  const from=F.from||td();const to=F.to||td();const cacheKey='hrcrm_cache_'+from+'_'+to;
  try{
    const{data,error}=await sb.from('candidates').select('*').gte('date',from).lte('date',to).order('date',{ascending:false}).order('created_at',{ascending:false}).limit(5000);
    if(error)throw error;rows=data||[];localStorage.setItem(cacheKey,JSON.stringify(rows));isOnline=true;setSyncing('ok','● онлайн');await syncQueue();
  }catch(e){isOnline=false;const cached=localStorage.getItem(cacheKey);if(cached){rows=JSON.parse(cached);setSyncing('err','● офлайн');}else{rows=[];setSyncing('err','● офлайн');}showOfflineBanner();}
  render();
}

let dashMode=false;

function renderTabs(){
  const recs=getRecs();
  let tabs=recs.map((r,i)=>`<div class="tab${!dashMode&&!infoMode&&i===tab?' active':''}" data-i="${i}">${r}<span class="pdot" data-rec="${r}"></span></div>`).join('');
  if(isAdmin)tabs+=`<div class="tab${dashMode?' active':''}" data-dash="1">📊 Дашборд</div>`;
  tabs+=`<div class="tab${infoMode?' active':''}" data-info="1">📚 Инфо</div>`;
  document.getElementById('tabsWrap').innerHTML=tabs;
  document.querySelectorAll('.tab[data-i]').forEach(t=>{t.onclick=()=>{dashMode=false;infoMode=false;tab=+t.dataset.i;F={from:td(),to:td(),okrug:'',da:'',status:'',city:'',fio:'',tel:''};clearSelection();loadData()}});
  const dt=document.querySelector('.tab[data-dash]');if(dt)dt.onclick=()=>{dashMode=true;infoMode=false;clearSelection();render();};
  const it=document.querySelector('.tab[data-info]');if(it)it.onclick=()=>{infoMode=true;dashMode=false;clearSelection();render();};
  renderPresence();
}

function render(){
  renderTabs();
  const dw=document.getElementById('dashWrap');const tw=document.querySelector('.table-wrap');const cw=document.getElementById('cardsWrap');
  const fb=document.getElementById('filtersBar');const sb2=document.getElementById('statsBar');const bb=document.getElementById('bulkBar');
  const iw=document.getElementById('infoWrap');
  if(infoMode){
    fb.style.display='none';sb2.style.display='none';bb.classList.remove('show');
    if(tw)tw.style.display='none';if(cw)cw.style.display='none';if(dw)dw.style.display='none';
    iw.classList.remove('hidden');renderInfo();
  } else if(dashMode){
    fb.style.display='none';sb2.style.display='none';bb.classList.remove('show');
    if(tw)tw.style.display='none';if(cw)cw.style.display='none';if(dw)dw.style.display='flex';
    iw.classList.add('hidden');renderDashboard();
  } else {
    fb.style.display='';sb2.style.display='';
    if(tw)tw.style.display='';if(cw)cw.style.display='';if(dw)dw.style.display='none';
    iw.classList.add('hidden');renderFilters();const fr=filtered();renderStats(fr);renderTable(fr);renderCards(fr);
  }
}

async function renderDashMain(from,to){
  const{data,error}=await sb.from('candidates').select('recruiter,status,da').gte('date',from).lte('date',to);
  if(error||!data){document.getElementById('dashContent').innerHTML='<div style="color:var(--muted)">Ошибка загрузки</div>';return;}
  const STATS=['думает','недозвон','отказ','принят','оформление','стажировка','резерв','жду доки','проверка СБ','передан в логистику'];
  const SC={'думает':'#eef2ff','недозвон':'#f2f2f7','отказ':'#fef2f2','принят':'#f0fdf4','оформление':'#ecfeff','стажировка':'#faf5ff','резерв':'#dbeafe','жду доки':'#fce7f3','проверка СБ':'#fef9c3','передан в логистику':'#dcfce7'};
  const ST={'думает':'#3730a3','недозвон':'#8e8e93','отказ':'#b91c1c','принят':'#15803d','оформление':'#0e7490','стажировка':'#7e22ce','резерв':'#1d4ed8','жду доки':'#9d174d','проверка СБ':'#854d0e','передан в логистику':'#15803d'};
  const stats={};ALL_R.forEach(r=>{stats[r]={total:0,logistic:0,statuses:{}}});
  data.forEach(row=>{if(!stats[row.recruiter])return;stats[row.recruiter].total++;if(row.status==='передан в логистику')stats[row.recruiter].logistic++;if(row.status&&row.status!=='—')stats[row.recruiter].statuses[row.status]=(stats[row.recruiter].statuses[row.status]||0)+1;});
  const rating=[...ALL_R].sort((a,b)=>stats[b].logistic-stats[a].logistic);const maxL=Math.max(...ALL_R.map(r=>stats[r].logistic),1);
  document.getElementById('dashContent').innerHTML=`
    <div style="font-size:13px;color:var(--muted);margin-bottom:12px">Всего анкет: <strong>${data.length}</strong></div>
    <div style="background:var(--surface);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:var(--sh)">
      <div style="font-size:12px;font-weight:600;margin-bottom:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px">🏆 Рейтинг — передано в логистику</div>
      ${rating.map((r,i)=>{const pct=Math.round(stats[r].logistic/maxL*100);const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';return`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:13px;font-weight:500">${medal} ${r}</span><span style="font-size:13px;font-weight:600;color:#15803d">${stats[r].logistic} <span style="font-weight:400;color:var(--muted);font-size:11px">(${stats[r].total?Math.round(stats[r].logistic/stats[r].total*100):0}%)</span></span></div><div style="background:#f2f2f7;border-radius:4px;height:6px;overflow:hidden"><div style="background:#34c759;height:100%;width:${pct}%;border-radius:4px"></div></div></div>`}).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px">
      ${ALL_R.map(r=>{const s=stats[r];const pY=s.total?Math.round((s.statuses['принят']||0)/s.total*100):0;return`<div style="background:var(--surface);border-radius:16px;padding:14px 16px;box-shadow:var(--sh)"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><div style="font-size:14px;font-weight:600">${r}</div><div style="font-size:20px;font-weight:700">${s.total}</div></div><div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px">${STATS.filter(st=>s.statuses[st]).map(st=>`<span style="background:${SC[st]};color:${ST[st]};padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500">${st}: ${s.statuses[st]}</span>`).join('')}</div><div style="font-size:11px;color:var(--muted)">Логистика: <strong style="color:#15803d">${s.logistic}</strong> · Конверсия: <strong>${pY}%</strong></div></div>`}).join('')}
    </div>`;
}

async function renderDashTime(){
  const{from,to}=getDashPeriod();
  const{data,error}=await sb.from('screen_time').select('*').gte('date',from).lte('date',to).order('date',{ascending:false});
  if(error){document.getElementById('dashContent').innerHTML='<div style="color:var(--muted)">Ошибка загрузки экранного времени</div>';return;}
  const stRows=data||[];const byUser={};
  stRows.forEach(r=>{if(!byUser[r.name])byUser[r.name]={total:0,days:{}};byUser[r.name].total+=r.seconds||0;byUser[r.name].days[r.date]=(byUser[r.name].days[r.date]||0)+(r.seconds||0);});
  const users=Object.keys(byUser).sort((a,b)=>byUser[b].total-byUser[a].total);
  const dates=[];const fromD=new Date(from);const toD=new Date(to);
  for(let d=new Date(fromD);d<=toD;d.setDate(d.getDate()+1)){dates.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));}
  document.getElementById('dashContent').innerHTML=`
    <div style="background:var(--surface);border-radius:16px;padding:16px;box-shadow:var(--sh);overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:12px;min-width:500px">
        <thead><tr>
          <th style="text-align:left;padding:6px 10px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border)">Рекрутер</th>
          ${dates.map(d=>`<th style="padding:4px 6px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap">${fd(d).slice(0,5)}</th>`).join('')}
          <th style="padding:6px 10px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border)">Итого</th>
        </tr></thead>
        <tbody>
          ${users.length?users.map(u=>`<tr><td style="padding:8px 10px;font-weight:500;border-bottom:1px solid var(--border)">${u}</td>${dates.map(d=>{const s=byUser[u].days[d]||0;return`<td style="padding:6px;text-align:center;border-bottom:1px solid var(--border);color:${s>3600?'var(--accent-dark)':s>0?'var(--text)':'var(--muted)'};background:${s>3600?'#e8f5e9':''};">${s>0?fmtTime(s):'—'}</td>`}).join('')}<td style="padding:8px 10px;font-weight:700;border-bottom:1px solid var(--border);color:var(--accent-dark)">${fmtTime(byUser[u].total)}</td></tr>`).join(''):'<tr><td colspan="100" style="padding:20px;text-align:center;color:var(--muted)">Нет данных за выбранный период</td></tr>'}
        </tbody>
      </table>
    </div>`;
}

function filtered(){
  const rec=getRecs()[tab]||getRecs()[0];
  return rows.filter(r=>{
    if(r.recruiter!==rec)return false;
    if(F.fio&&!r.fio?.toLowerCase().includes(F.fio.toLowerCase()))return false;
    if(F.tel&&!r.tel?.replace(/\D/g,'').includes(F.tel.replace(/\D/g,'')))return false;
    if(F.from&&r.date<F.from)return false;if(F.to&&r.date>F.to)return false;
    if(F.okrug&&r.okrug!==F.okrug)return false;if(F.da&&r.da!==F.da)return false;
    if(F.status&&r.status!==F.status)return false;if(F.city&&r.city!==F.city)return false;
    return true;
  });
}

function renderStats(fr){
  const t=fr.length,y=fr.filter(r=>r.da==='да').length,n=fr.filter(r=>r.da==='нет').length,th=fr.filter(r=>r.da==='думает').length,p=t?Math.round(y/t*100):0;
  document.getElementById('statsBar').innerHTML=`<div class="stat"><span class="sv">${t}</span><span class="sl">всего</span></div><div class="stat yes"><span class="sv">${y}</span><span class="sl">да (${p}%)</span></div><div class="stat no"><span class="sv">${n}</span><span class="sl">нет</span></div><div class="stat"><span class="sv">${th}</span><span class="sl">думают</span></div>`;
}

function renderTable(fr){
  const allChk=fr.length>0&&fr.every(r=>selected.has(r.id));
  document.getElementById('thead').innerHTML=`<tr><th><input type="checkbox" id="checkAll" ${allChk?'checked':''}></th><th></th><th>Дата</th><th>Время</th><th>ФИО</th><th>Тел</th><th>Округ</th><th>Да/Нет</th><th>Статус</th><th>Юр.Ст.</th><th>Город</th><th>Комментарий</th><th></th></tr>`;
  document.getElementById('checkAll').onchange=function(){if(this.checked)selectAll(fr);else clearSelection();};
  if(!fr.length){document.getElementById('tbody').innerHTML=`<tr><td colspan="13"><div class="empty-state">Нет записей за выбранный период</div></td></tr>`;return}
  document.getElementById('tbody').innerHTML=fr.map(r=>{const sc=sClass(r.status);const chk=selected.has(r.id);return`
    <tr class="${sc?'r-'+sc:''} ${chk?'selected':''}" data-id="${r.id}" draggable="true">
      <td><input type="checkbox" ${chk?'checked':''} onclick="toggleSelect('${r.id}')"></td>
      <td><span class="drag-handle">⠿</span></td>
      <td>${fd(r.date)}</td><td>${r.time||'—'}</td>
      <td style="font-weight:600;min-width:140px">${r.fio||'—'}</td>
      <td style="white-space:nowrap;cursor:pointer;color:var(--blue)" onclick="copyPhone('${esc(r.tel||'')}')" title="Копировать">${r.tel||'—'}</td>
      <td style="white-space:nowrap">${r.okrug||'—'}</td>
      <td>${daBadge(r.da)}</td><td>${stBadge(r.status)}</td>
      <td>${r.jur||'—'}</td><td>${r.city||'—'}</td>
      <td style="color:var(--muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(r.comment)}">${r.comment||'—'}</td>
      <td><button onclick="openEdit('${r.id}')" style="background:none;border:none;cursor:pointer;font-size:15px">✏️</button></td>
    </tr>`}).join('');
  initDrag();
}

function renderCards(fr){
  const wrap=document.getElementById('cardsWrap');
  if(!fr.length){wrap.innerHTML='<div class="empty-state">Нет записей за выбранный период</div>';return}
  wrap.innerHTML=fr.map(r=>{const sc=sClass(r.status);const chk=selected.has(r.id);return`
    <div class="card${sc?' r-'+sc:''} ${chk?'selected':''}" data-id="${r.id}">
      <div class="card-check" onclick="event.stopPropagation();toggleSelect('${r.id}')">${chk?'✓':''}</div>
      <div onclick="openEdit('${r.id}')">
        <div class="card-top"><div class="card-name">${r.fio||'—'}</div><div class="card-time">${fd(r.date)} ${r.time||''}</div></div>
        <div class="card-tel" onclick="event.stopPropagation();copyPhone('${esc(r.tel||'')}')">${r.tel||'—'}</div>
        <div class="card-chips">${r.okrug&&r.okrug!=='—'?`<span class="chip c-empty">${r.okrug}</span>`:''}${daBadge(r.da)}${stBadge(r.status)}${r.jur&&r.jur!=='—'?`<span class="chip c-empty">${r.jur}</span>`:''}${r.city&&r.city!=='—'?`<span class="chip c-empty">${r.city}</span>`:''}</div>
        ${r.comment?`<div class="card-comment">${r.comment}</div>`:''}
      </div>
    </div>`}).join('');
}

function initDrag(){
  document.querySelectorAll('#tbody tr[draggable]').forEach(row=>{
    row.ondragstart=e=>{if(e.target.tagName==='INPUT')return;dragId=row.dataset.id;row.style.opacity='.4';e.dataTransfer.effectAllowed='move'};
    row.ondragend=()=>{row.style.opacity='1';document.querySelectorAll('#tbody tr').forEach(r=>r.style.borderTop='')};
    row.ondragover=e=>{e.preventDefault();document.querySelectorAll('#tbody tr').forEach(r=>r.style.borderTop='');row.style.borderTop='2px solid var(--accent)'};
    row.ondrop=async e=>{e.preventDefault();row.style.borderTop='';if(dragId===row.dataset.id)return;const src=rows.find(r=>r.id===dragId),dst=rows.find(r=>r.id===row.dataset.id);if(!src||!dst)return;await sb.from('candidates').update({sort_order:dst.sort_order??0}).eq('id',dragId);await sb.from('candidates').update({sort_order:src.sort_order??0}).eq('id',row.dataset.id);loadData();};
  });
}

function openModal(){
  editId=null;document.getElementById('modalTitle').textContent='Новая запись';document.getElementById('delBtn').classList.add('hidden');
  const dt=nowDT();document.getElementById('fDate').value=dt.date;document.getElementById('fTime').value=dt.time;
  document.getElementById('fFio').value='';document.getElementById('fTel').value='';document.getElementById('fComment').value='';
  ['fOkrug','fDa','fStatus','fJur','fCity'].forEach(id=>{document.getElementById(id).value='—';});
  document.getElementById('modalBg').classList.add('open');setTimeout(()=>document.getElementById('fFio').focus(),300);
}

function openEdit(id){
  const r=rows.find(x=>x.id===id);if(!r)return;editId=id;
  document.getElementById('modalTitle').textContent='Редактировать';document.getElementById('delBtn').classList.remove('hidden');
  document.getElementById('fDate').value=r.date||'';document.getElementById('fTime').value=r.time||'';
  document.getElementById('fFio').value=r.fio||'';
  const tel=r.tel||'';document.getElementById('fTel').value=tel.startsWith('+7')?tel.slice(2):tel;
  document.getElementById('fOkrug').value=r.okrug||'—';document.getElementById('fDa').value=r.da||'—';
  document.getElementById('fStatus').value=r.status||'—';document.getElementById('fJur').value=r.jur||'—';
  document.getElementById('fCity').value=r.city||'—';document.getElementById('fComment').value=r.comment||'';
  document.getElementById('modalBg').classList.add('open');
}

document.getElementById('cancelBtn').onclick=()=>document.getElementById('modalBg').classList.remove('open');
document.getElementById('modalBg').onclick=function(e){if(e.target===this)this.classList.remove('open')};

document.getElementById('saveBtn').onclick=async function(){
  const rec=getRecs()[tab]||getRecs()[0];
  const telRaw=document.getElementById('fTel').value.trim();
  const fioVal=document.getElementById('fFio').value.trim();
  const d={recruiter:rec,date:document.getElementById('fDate').value,time:document.getElementById('fTime').value,fio:fioVal||'—',tel:telRaw?'+7'+telRaw.replace(/^\+?7?/,''):'—',okrug:document.getElementById('fOkrug').value||'—',da:document.getElementById('fDa').value||'—',status:document.getElementById('fStatus').value||'—',jur:document.getElementById('fJur').value||'—',city:document.getElementById('fCity').value||'—',comment:document.getElementById('fComment').value.trim()};
  this.textContent='Сохраняю...';this.disabled=true;
  let saved=false;
  if(editId){const{error}=await sb.from('candidates').update(d).eq('id',editId);if(!error){saved=true}else{addToQueue({type:'update',data:d,rowId:editId});saved=true;}}
  else{const{error}=await sb.from('candidates').insert(d);if(!error){saved=true}else{const cacheKey='hrcrm_cache_'+d.date+'_'+d.date;const cached=JSON.parse(localStorage.getItem(cacheKey)||'[]');cached.push({...d,id:'temp_'+Date.now(),sort_order:0,created_at:new Date().toISOString()});localStorage.setItem(cacheKey,JSON.stringify(cached));addToQueue({type:'insert',data:d});rows=cached;saved=true;}}
  this.textContent='Сохранить';this.disabled=false;
  if(saved){document.getElementById('modalBg').classList.remove('open');await loadData();}
};

document.getElementById('delBtn').onclick=async function(){
  if(!editId||!confirm('Удалить запись?'))return;
  await sb.from('candidates').delete().eq('id',editId);
  document.getElementById('modalBg').classList.remove('open');await loadData();
};
</script>
</body>
</html>
